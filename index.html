                <dokki-topic title="VCS">
                    <sw-category :categories="['Desktop','Video capture']">
                    </sw-category>

                    <p>
                        A useful capture tool for Datapath's VisionRGB range of capture cards. Features
                        a variable output refresh rate, anti-tearing, highly configurable image filtering,
                        video presets with activation by resolution, refresh rate and shortcut, and several
                        other things that enable high-quality analog and digital capture for recreational
                        and professional use.
                    </p>

                    <p>
                        VCS supports capturing in Windows (XP and later) and Linux (kernel 5).
                        Since it also has a low reliance on GPU features, VCS is highly compatible with
                        virtualization software (tested to run in QEMU, VMWare Player, and VirtualBox).
                        Fully virtualized capture via PCI passthrough in QEMU (Linux host, Windows
                        XP and 7 guest) from a Datapath VisionRGB-PRO has been confirmed working.
                    </p>

                    <p>
                        VCS introduces minimal latency to the capture chain. The full latency from a
                        visual event triggering in the target system to it being captured by a Datapath
                        VisionRGB device, uploaded into system memory for VCS, and displayed in VCS's
                        output window is typically in single-digit milliseconds for common VGA
                        resolutions.
                    </p>

                    <p>
                        The VCS architecture runs a central execution loop which calls on functionality
                        provided by its subsystems to capture, manipulate, and display frames obtained
                        from the capture device. The subsystems are self-contained and provide a public
                        interface both for using the subsystem and replacing it with another implementation
                        of the interface. For example, support for new capture devices can be added
                        by replacing the implementation of
                        <a href="https://www.tarpeeksihyvaesoft.com/vcs/devdocs/capture_8h.html">
                        the capture subsystem interface</a>.
                    </p>

                    <p>
                        VCS comes with fully custom GUI styling made using Qt's CSS-like QSS language.
                    </p>

                    <p>
                        Includes an end-user's manual (GitHub Markdown) and developer documentation (Doxygen
                        with custom theming).
                    </p>

                    <p>
                        Made in 2017&ndash;2021.
                    </p>

                    <sw-tech-list :tech="['C++','Qt','OpenCV','Video4Linux','Doxygen','Python','PHP','CSS']">
                    </sw-tech-list>

                    <p>

                    </p>

                <dokki-topic title="RallySportED">
                    <sw-category :categories="['Multi-platform','Modding']">
                    </sw-category>
                    
                    <p>
                        A multi-platform asset-editing toolset for the cult DOS game Rally-Sport. This toolset
                        lets you create and edit tracks, textures, and various other aspects of the game. To
                        my knowledge, it's the only available modding tool for the game.
                    </p>

                    <p>
                        The browser version runs in modern browsers like Google Chrome. It dutifully reproduces
                        Rally-Sport's unique 3D rendering style, with <i>n</i>-sided polygons, screen space
                        texture-mapping, and one-point perspective. It integrates a browser version of DOSBox
                        for playing custom content in-game in the browser, and provides WebRTC data streaming
                        for easy sharing of your creations with friends.
                    </p>

                    <p>
                        The Windows version supports Windows 95 and up, is Wine-compatible, and provides 3D
                        hardware rendering via OpenGL and Glide (with fallback software rendering available).
                        The Windows version is currently deprecated in favor of the browser version.
                    </p>

                    <p>
                        The DOS version is written in 386 assembly. It includes the required loader program
                        for playing custom content in Rally-Sport, as well as a clever AI opponent editor.
                        This version used also to include track and texture editors, but they've been
                        deprecated in favor of the browser version.
                    </p>

                    <p>
                        Made in 2016&ndash;2021.
                    </p>

                    <sw-tech-list :tech="['JavaScript','386 assembly','C','C++','IDA']">
                    </sw-tech-list>

                <dokki-topic title="Lintulista">
                    <sw-category :categories="['Web','Full-stack']">
                    </sw-category>

                    <p>
                        A web app for hobbyist birdwatchers to keep track of their sighted species
                        in a visually engaging, slightly gamified way. Each sighting is represented
                        as a card showing an image of the species along with the date of observation,
                        while the total of observations made are presented as a list of these cards
                        &ndash; usage of the  program is then akin to card-collecting.
                    </p>

                    <p>
                        To make debugging and runtime error-reporting easier, as well as to improve
                        the reliability of the program, Lintulista's JavaScript code enforces type
                        checks with explicit runtime assertions, introduces underlying typing for
                        custom objects via simple pseudo-inheritance, and provides a try/catch-wrapping
                        action system that groups related commands toward a goal with the user-facing
                        error messages associated with that goal's failure states.
                    </p>
                    
                    <p>
                        Lintulista's backend is Heroku-compatible and makes an attempt to minimize
                        the use of database rows &ndash; potentially useful for those on the limited
                        Heroku Free plan. The backend provides unit tests, while the frontend implements
                        React component tests.
                    </p>

                    <p>
                        The Lintulista repo comes with tooling to semi-automate the creation bird
                        thumbnails from images on Wikimedia Commons.
                    </p>

                    <p>
                        Lintulista is for private use at this time, but a public sample is provided
                        (see links, below).
                    </p>

                    <p>
                        Made in 2019/2021.
                    </p>

                    <sw-tech-list :tech="['JavaScript','React','CSS','Node.js','PostgreSQL','C++','Qt','PHP']">
                    </sw-tech-list>
                    
                    <p>

                <dokki-topic title="The retro n-gon renderer">
                    <sw-category :categories="['Web','Front-end','Rendering','Software rasterization']">
                    </sw-category>
                    
                    <p>
                        A well-featured, retro-oriented 3D software renderer for the HTML5 canvas.
                        Rasterizes <i>n</i>-sided polygons onto a given canvas &ndash; or, optionally,
                        into an offscreen pixel buffer.
                    </p>
                    
                    <p>
                        This renderer features retro aesthetics; reasonable performance (for
                        lower-resolution rendering); vertex and pixel shaders; affine and screen space
                        texture-mapping; rasterization of points, lines, and <i>n</i>-sided convex
                        polygons; flat, per-vertex (Gouraud), and per-pixel (Phong) shading; alpha
                        testing; stippled alpha blending; 16-bit (RGBA/5551) and 32-bit (RGBA/8888)
                        textures; texture mip-mapping; clamped and repeating UV coordinates with
                        support for negative coordinates; wireframe rendering; translation, rotation,
                        and scaling of vertices; async rendering using Web Workers; Blender export;
                        unit, integration, and performance tests; a streamlined API; docs; samples;
                        and more.
                    </p>
                    
                    <p>
                        The renderer has no external dependencies. It uses a plain Bash script to
                        bundle its source files into a single-file distributable, which can be
                        imported either globally or as an ES6 module.
                    </p>

                    <p>
                        Made in 2019&ndash;2021.
                    </p>

                    <dokki-code title="Sample vertex shader"
                                syntax="javascript">

                        <template #code>
                            <pre>
                                // The renderer will call this function for each n-gon following the lighting
                                // and world-space transformation steps but prior to rasterization.
                                function pulsing_vertex_shader(ngon)
                                {
                                    const timer = (performance.now() / 900);
                                    const pulseMult = Math.abs(Math.sin(timer));

                                    for (let v = 0; v < ngon.vertices.length; v++)
                                    {
                                        ngon.vertices[v].shade = Math.max(0.5, (pulseMult * v));
                                    }
                                }
                            </pre>
                        </template>

                    <dokki-code title="Selective pixel shader"
                                syntax="javascript">

                        <template #code>
                            <pre>
                                // The renderer will call this function once the current frame has been rasterized.
                                // The 'fragmentBuffer' property contains metadata about each pixel, like world-
                                // space coordinates and n-gon material properties.
                                function wavy_pixel_shader({renderWidth, renderHeight, fragmentBuffer, ngonCache, pixelBuffer})
                                {
                                    const timer = (performance.now() / 300);

                                    for (let y = 0; y < renderHeight; y++)
                                    {
                                        const horMagnitude = 7;
                                        const verMagnitude = ((y / renderWidth) * 10);
                                        const cos = (horMagnitude * Math.cos(timer + verMagnitude));

                                        for (let x = 0; x < renderWidth; x++)
                                        {
                                            const dstIdx = (4 * (x + y * renderWidth));
                                            const srcIdx = (4 * (Math.min((renderWidth - 1), (x + horMagnitude + ~~cos)) + y * renderWidth));
                                            const fragment = fragmentBuffer[srcIdx / 4];

                                            if (!ngonCache[fragment.ngonIdx].material.isWavy)
                                            {
                                                continue;
                                            }
                                            
                                            pixelBuffer[dstIdx + 0] = pixelBuffer[srcIdx + 0];
                                            pixelBuffer[dstIdx + 1] = pixelBuffer[srcIdx + 1];
                                            pixelBuffer[dstIdx + 2] = pixelBuffer[srcIdx + 2];

                                            pixelBuffer[srcIdx + 0] = 255;
                                            pixelBuffer[srcIdx + 1] = 255;
                                            pixelBuffer[srcIdx + 2] = 255;
                                        }
                                    }
                                }
                            </pre>
                        </template>

                <dokki-topic title="PCbi">
                    <sw-category :categories="['Desktop','User interface']">

                    <p>
                        A 3D front-end for the PC emulator PCem. PCbi replaces PCem's text-based
                        user interface with a 3D scene in which you can assemble and run emulated
                        computers.
                    </p>

                    <p>
                        Rather than clicking through plaintext menus to select which components
                        an emulated PC should have, PCbi lets you stick components into a
                        motherboard in a 3D view &ndash; making the assembly a more tangible,
                        rewarding experience. Once the PC has been assembled, PCem can be made
                        to run the emulation on its virtual screen.
                    </p>

                    <p>
                        PCbi uses shared memory in Linux and Windows to interface and exchange
                        runtime data with PCem. The 3D renderer uses OpenGL for rasterization.
                        A custom GUI styling has been implemented using Qt's HTML and CSS
                        facilities. Tooling is provided for adding new hardware components.
                    </p>

                        Made in 2018&ndash;2021.

                <dokki-topic title="Cloud simulation">
                    <sw-category :categories="['Desktop','Simulation','Atmosphere']">
                    </sw-category>
                    
                    <p>
                        Ever wanted a cloud physics simulator and renderer? Maybe not, but this
                        app provides.
                    </p>
                    
                    <p>
                        The program simulates the rising of moist air and the subsequent condensation
                        of cloud-forming droplets as the air cools; then renders the resulting 3D
                        droplet grid into a realistic image of clouds.
                    </p>
                    
                    <p>
                        You can configure the simulator's atmospheric properties to your liking,
                        including the environmental lapse rate and relative humidity curves. The
                        GUI provides real-time visualization of the state of the simulation, showing
                        the relative humidity, air temperature, and droplet distribution either as
                        averages across the simulation grid or as horizontal or vertical slices.
                    </p>
                    
                    <p>
                        The renderer uses volumetric path tracing and photon mapping to model
                        in-cloud light transfer. Spectral Mie scattering is empirically approximated
                        (by eyeballing MiePlot graphs), while the Hosek&ndash;Wilkie 2012 sky
                        model is used to approximate Rayleigh scattering. Optionally, a HDR
                        environment map can be used in place of the parametric sky model.
                    </p>

                    <p>
                        OpenCL is used to accelerate calculations of condensation (a square
                        root and a multiplication or two per simulation grid cell, each cell
                        being processable parallel to the others), while the renderer works
                        on tiles distributed across the system's cores.
                    </p>

                    <p>
                        This program required a beefy computer. With a mid-to-low-range home PC
                        of the time, running the simulation on a high-resolution grid (e.g. 300
                        &times; 300 &times; 300) could take hours, and the rendering would take
                        several days to converge to a relatively noise-free outcome even at low
                        render resolutions (e.g. 512 &times; 512).
                    </p>

                    <p>
                        Made in 2013&ndash;2014.
                    </p>

                    <sw-tech-list :tech="['C++','Qt','OpenCL']">
                    </sw-tech-list>

                <dokki-topic title="U7DCP">
                    <sw-category :categories="['Desktop','Patch']">
                    </sw-category>
                    
                    <p>
                        Patches a bug/feature in Ultima 7 that forces the CPU cache on at launch.
                    </p>

                    <p>
                        Ultima 7 &ndash; like many programs of the time &ndash; will run too fast
                        on PCs that are much newer than what the game was originally made for. A
                        common workaround for this kind of problem is to soft-disable the CPU's
                        cache, heavily reducing its performance and thus bringing it more in line
                        with what the program expects.
                    </p>

                    <p>
                        Unfortunately, this workaround is no good for Ultima 7, because the game
                        resets the cache-disabling CPU flag on launch. Bummer.
                    </p>

                    <p>
                        Luckily, this patch modifies the game executables so that they preserve
                        the relevant CPU flag. As a result, the game can be run with the cache
                        off.
                    </p>

                    <p>
                        Thanks to a member (whose name is unfortunately forgotten) of the VOGONS
                        forum for discovering that the bug had to do with the game resetting CPU
                        flags.
                    </p>

                    <p>
                        Made in 2017.
                    </p>

                    <sw-tech-list :tech="['386 assembly','IDA']">
                    </sw-tech-list>
                    
                    <p>
                        Links: <a href="https://www.github.com/leikareipa/u7dcp">GitHub</a>
                    </p>

                    <hr class="topic-section-separator">

                    <dokki-console platform="windows"
                                command="u7dcp.exe">
                        <template #output>
                            <pre>
                                U7DCP - Ultima VII DOS Cache Patch.

                                Patching MAINMENU.EXE...
                                Patching ENDGAME.EXE...

                                The patching appears to have gone well.
                            </pre>
                        </template>
                    </dokki-console>

                    <dokki-code title="The patch payload"
                                syntax="x86asm">

                        <template #code>
                            <pre>
                                ; The game wants to enable protected mode as the first step in entering
                                ; unreal mode. Normally, it assigns 1 to EBX, which sets the relevant
                                ; first bit but also resets all the other bits (importantly, bit #30,
                                ; for cache disable). Instead, we want to set only the first bit and
                                ; leave the others untouched.
                                mov ebx, cr0
                                or bl, 1
                                mov cr0, ebx

                                ; ...

                                ; The game has entered unreal mode and is ready to disable protected
                                ; mode. Again, we want to manipulate only the relevant first bit.
                                and bl, 0feh
                                mov cr0, ebx
                            </pre>
                        </template>
                    </dokki-code>

                <dokki-topic title="Kelpo">
                    <sw-category :categories="['Desktop','Rendering','Hardware rasterization']">
                    </sw-category>
                    
                    <p>
                        A streamlined, retro-oriented Win32 3D rasterizer API wrapper.
                    </p>
                    
                    <p>
                        The idea behind Kelpo is to create an easy-to-use umbrella render API that
                        exposes a minimal unifying feature set to cover as many 1990s 3D APIs/hardware
                        as reasonably possible and producing generally the same output image regardless
                        of which render platform is being used. (The 1990s, you may recall, saw a
                        relative lack of 3D rendering standards and a wild west of video card
                        feature-sets &ndash; see e.g. <a href="https://vintage3d.org/">vintage3d.org</a>
                        for more info.)
                    </p>
                    
                    <p>
                        Kelpo is work-in-progress (there's no hurry to complete it), and currently
                        supports Direct3D 5, Direct3D 7, OpenGL 1.1, OpenGL 3.0, and Glide 3.
                        Planned support includes the proprietary 3D APIs of Matrox, S3, and ATi.
                    </p>

                    <p>
                        Made in 2019&ndash;2020.
                    </p>

                    <sw-tech-list :tech="['C','OpenGL','Direct3D','Glide']">
                    </sw-tech-list>
                    
                    <p>
                        Links: <a href="https://www.github.com/leikareipa/kelpo">GitHub</a>
                    </p>

                <dokki-topic title="KAC">
                    <sw-category :categories="['File format']">
                    </sw-category>
                    
                    <p>
                        A binary file format for storing 3D models and their textures; a companion
                        format for the <a href="#kelpo">Kelpo</a> renderer. Designed with limitations
                        of 1990s 3D hardware in mind.
                    </p>

                    <p>
                        A KAC file stores vertices, normals and UV coordinates in 32-bit floats. Texture
                        data are stored in 16-bit color with transparency (RGBA4444); polygon colors are
                        stored in 16 bits with alpha (RGBA5551). Textures are stored with mipmapping down
                        to 1&times;1. Because a KAC file includes the model's entire set of textures, each
                        texture is associated with a 128-bit SHA-256 pixel data hash to allow duplicate
                        textures to be discarded when loading multiple KAC files.
                    </p>
                    
                    <p>
                        An importer &ndash; for loading KAC meshes into C/C++ programs &ndash; and
                        exporter &ndash; for converting OBJ models into KAC meshes &ndash; are provided.
                        The exporter automatically generates texture mipmaps and converts pixels into
                        16-bit color.
                    </p>

                    <p>
                        Made in 2019&ndash;2020.
                    </p>

                    <sw-tech-list :tech="['C','C++','Qt']">
                    </sw-tech-list>
                    
                    <p>
                        Links:
                        <a href="https://github.com/leikareipa/kac-file-format/blob/master/1.0-draft/kac-1.0-spec-draft.txt">Spec (1.0 draft)</a> &bull;
                        <a href="https://www.github.com/leikareipa/kac-file-format">GitHub</a>
                    </p>

                <dokki-topic title="What">
                    <sw-category :categories="['Web','Front-end','Audio/video']">
                    </sw-category>
                    
                    <p>
                        A HTML5 video player whose seek bar shows an expandable spectrogram of the video's
                        audio. This is effectively a feature-optimized browser version of
                        <a href="#av-scissors">AV Scissors</a>.
                    </p>

                    <p>
                        Samples the output of a &lt;video&gt; element using an AnalyserNode to produce a
                        time-variant spectrum (audio spectrogram), then paints it onto a &lt;canvas&gt;
                        on the video's seek bar.
                    </p>

                <dokki-topic title="Vond">
                    <sw-category :categories="['Desktop','Rendering','Hybrid']">
                    </sw-category>

                    <p>
                        A hybrid voxel/polygon 3D software renderer that gets its inspiration from
                        retro voxel/polygon games like Delta Force and Outcast.
                    </p>

                    <p>
                        The voxel renderer makes 2D heightmaps into 3D landscapes. It's effectively a
                        ray tracer, tracing a ray through each pixel on the screen and sampling height
                        values from the heightmap along the ray's path. The renderer has full six
                        degrees of freedom, multi-threading, and bilinear interpolation.
                    </p>

                    <p>
                        The polygon renderer supports single-threaded scanline and barycentric
                        rasterization. It uses the depth map generated by the voxel renderer to
                        discard pixels occluded by the terrain.
                    </p>

                    <p>
                        Made in 2018&ndash;2021.
                    </p>

                    <sw-tech-list :tech="['C++']">
                    </sw-tech-list>
                    
                    <p>

                <dokki-topic title="DOS video chip compatibility list">
                    <sw-category :categories="['Web','Front-end','User interface']">

                    <p>
                        An early webdev effort of mine. The goal was to re-design Gona's very useful
                        but somewhat hard-to-read DOS video chip compatibility matrix (see link, below)
                        for improved usability.

                    <p>
                        I harvested the matrix's HTML data, converted it into a JSON format, and
                        implemented a front-end to provide a structured view to the data. The view
                        shows the user an overall compatibility score for each video chip, lists the
                        chips by most compatible to least compatible, and allows the user filter the
                        results list by chip or manufacturer name.

                        Made in 2018.

                <dokki-topic title="OPDB">
                    <sw-category :categories="['Desktop','Database']">
                    </sw-category>
                    
                    <p>
                        A no-frills database and grapher for minimalist logging of sequential data.
                    </p>

                    <p>
                        The database, loosely termed, is a headerless binary file consisting of 12-byte
                        time/value pairs: a 4-byte <i>float</i> that stores a value logged on an occasion,
                        and an 8-byte <i>int</i> that records the time &ndash; in milliseconds since
                        epoch &dash; of the occasion. The database provides a simple command-line
                        interface for entering and fetching data.
                    </p>

                    <p>
                        The grapher produces no-nonsense visual readouts of data from databases.
                    </p>

                    <p>
                        This program was purposefully written to conform to feature minimalism: it has a
                        small set of base features, enough to do the intended business, and is to receive
                        no new features regardless of post-creation needs.
                    </p>

                    <p>
                        Made originally in 2016.
                    </p>

                    <sw-tech-list :tech="['C','PHP']">
                    </sw-tech-list>
                    
                    <p>
                        Links: <a href="https://www.github.com/leikareipa/opdb">GitHub</a>
                    </p>

                <dokki-topic title="Smartti parseri">
                    <sw-category :categories="['Desktop','Visualization']">
                    </sw-category>
                    
                    <p>
                        A utility to turn hard drive SMART logs (i.e. output dumps from <i>smartctl</i>)
                        into nice little graphs.
                    </p>

                    <p>
                        Provides a configuration file with which the user can customize the generated
                        imagery. Graphs can be arranged into customized rows and columns, and simple
                        mathematical expressions can be given to modify the logged values for output
                        (e.g. to convert Celsius &rarr; Kelvin).
                    </p>

                    <p>
                        The program uses Qt to draw the graphs and for exporting them into PNG image
                        files.
                    </p>

                    <p>
                        Made in 2015.
                    </p>
