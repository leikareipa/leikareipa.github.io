                <dokki-topic title="VCS">
                    <p>
                        A useful capture tool for Datapath's VisionRGB range of capture cards. Features
                        anti-tearing, advanced image filtering, video presets with activation by resolution,
                        refresh rate and shortcut, and several other things that enable high-quality
                        analog and digital capture for recreational and professional use.
                    </p>

                    <p>
                        Implements fully custom-designed GUI styling with Qt/QSS. Subclasses several Qt
                        components for custom functionality. Manages a multi-threaded context to synchronize
                        hardware and software. Allows creating complex chains of image filters with a node
                        graph. Outputs in software and OpenGL (supports variable refresh rate). Leverages
                        Qt for HTML/CSS-stylable capture overlays. Supports capturing in Windows (XP and up)
                        and Linux (5.x). Low reliance on GPU features; can run virtualized in QEMU, VMWare,
                        and VirtualBox.
                    </p>

                    <p>
                        Although made for Datapath capture cards, VCS's code provides an interface with
                        which support for other manufacturers' hardware can be added. Find out more in the
                        <a href="https://www.tarpeeksihyvaesoft.com/vcs/devdocs/capture_8h.html">
                        developer docs</a>.
                    </p>

                    <p>
                        Includes an end-user's manual (GitHub Markdown) and developer documentation (Doxygen
                        with custom theming).
                    </p>

                    <p>
                        Made between 2017-2021.
                    </p>

                    <p>
                        Tech used: C++, Qt, OpenCV, Video4Linux, Doxygen, Python, PHP, CSS
                    </p>
                    
                    <p>
                        Links:
                        <a href="https://www.github.com/leikareipa/vcs">GitHub</a> &bull;

                    </p>

                <dokki-topic title="PCbi">
                    <p>
                        A unique 3D frontend for the PC emulator PCem. Assemble an olden PC
                        in a 3D environment and have PCem's emulation run on its screen.
                    </p>

                    <p>
                        Implements shared memory communication with PCem in Linux and Windows.
                        Originally used full software 3D rendering (barycentric rasterization)
                        but now has software transform + OpenGL rasterization. Custom-styled
                        Qt GUI. Moddable: tooling and documentation is provided for creating
                        and adding new hardware components.
                    </p>

                    <p>
                        Made between 2018-2021.
                    </p>
            
                    <p>
                        Tech used: C++, Qt, OpenGL, JavaScript, Blender
                    </p>

                <dokki-topic title="Lintulista">
                    <p>
                        A full-stack web app for hobbyist birdwatchers to keep track of their sightings.
                        Used to be publically available but is currently closed-access; the code is
                        open-source and a public sample is provided (see links, below).
                    </p>

                    <p>
                        The code enforces type checks, implements pseudo-inheritance with underlying typing
                        for custom objects and uses a try/catch-wrapping action system to make debugging
                        and end-user error-reporting easier and less verbose to write.
                    </p>
                    
                    <p>
                        The backend is Heroku-compatible and conserves database rows &ndash; useful
                        for those on the limited Heroku Free plan.
                    </p>

                    <p>
                        Unit tests are implemented for the backend; the frontend implements React component
                        tests (but see <a href="https://github.com/leikareipa/lintulista-client/releases/tag/beta.2">
                        beta.2 release notes</a>).
                    </p>

                    <p>
                        Comes with tooling to semi-automate the creation of copyright info-preserving
                        bird thumbnails from images on Wikimedia Commons.
                    </p>

                    <p>
                        Made in 2019/2021.
                    </p>
            
                    <p>
                        Tech used: JavaScript, React, Redux, CSS, Node.js, PostgreSQL, C++, Qt
                    </p>
                    
                    <p>
                        Links:
                        <a href="https://www.tarpeeksihyvaesoft.com/lintulista/#samplelst">View sample</a> &bull;

                        <a href="https://www.github.com/leikareipa/lintulista-server">GitHub (server)</a>
                    </p>

                <dokki-topic title="Retro n-gon renderer">
                    <p>
                        A well-featured retro-oriented 3D software renderer for the HTML5 canvas.
                        Rasterizes n-sided polygons onto either a canvas or an offscreen buffer.
                    </p>
                    
                    <p>
                        Features genuine retro aesthetics, reasonable performance, vertex and pixel
                        shaders, async rendering, modular design, streamlined API, docs, lots of
                        samples, a Blender exporter, and more.
                    </p>
                    
                    <p>
                        The project depends on no extra packages or package managers, and uses a plain
                        Bash script to bundle the source files into a single-file distributable that
                        can be imported either globally or as an ES6 module.
                    </p>

                    <p>
                        Unit, integration and performance tests are provided.
                    </p>

                    <p>
                        Made between 2019-2021.
                    </p>
            
                    <p>
                        Tech used: JavaScript
                    </p>
                    
                    <p>
                        Links:
                        <a href="https://www.github.com/leikareipa/retro-ngon">GitHub</a> &bull;
                        <a href="https://github.com/leikareipa/retro-ngon/blob/master/README.md#users-manual">User's manual</a> &bull;

                    <dokki-code title="Sample vertex shader">

                        <template #code>
                            <pre>
                                // The renderer will call this function for each n-gon following the lighting
                                // and world-space transformation steps but prior to rasterization.
                                function pulsing_vertex_shader(ngon)
                                {
                                    const timer = (performance.now() / 900);
                                    const pulseMult = Math.abs(Math.sin(timer));

                                    for (let v = 0; v < ngon.vertices.length; v++)
                                    {
                                        ngon.vertices[v].shade = Math.max(0.5, (pulseMult * v));
                                    }
                                }
                            </pre>
                        </template>

                    <dokki-code title="Selective pixel shader">

                        <template #code>
                            <pre>
                                // The renderer will call this function once the current frame has been rasterized.
                                // The 'fragmentBuffer' property contains metadata about each pixel, like world-
                                // space coordinates and n-gon material properties.
                                function wavy_pixel_shader({renderWidth, renderHeight, fragmentBuffer, ngonCache, pixelBuffer})
                                {
                                    const timer = (performance.now() / 300);

                                    for (let y = 0; y < renderHeight; y++)
                                    {
                                        const horMagnitude = 7;
                                        const verMagnitude = ((y / renderWidth) * 10);
                                        const cos = (horMagnitude * Math.cos(timer + verMagnitude));

                                        for (let x = 0; x < renderWidth; x++)
                                        {
                                            const dstIdx = (4 * (x + y * renderWidth));
                                            const srcIdx = (4 * (Math.min((renderWidth - 1), (x + horMagnitude + ~~cos)) + y * renderWidth));
                                            const fragment = fragmentBuffer[srcIdx / 4];

                                            if (!ngonCache[fragment.ngonIdx].material.isWavy)
                                            {
                                                continue;
                                            }
                                            
                                            pixelBuffer[dstIdx + 0] = pixelBuffer[srcIdx + 0];
                                            pixelBuffer[dstIdx + 1] = pixelBuffer[srcIdx + 1];
                                            pixelBuffer[dstIdx + 2] = pixelBuffer[srcIdx + 2];

                                            pixelBuffer[srcIdx + 0] = 255;
                                            pixelBuffer[srcIdx + 1] = 255;
                                            pixelBuffer[srcIdx + 2] = 255;
                                        }
                                    }
                                }
                            </pre>
                        </template>

                        <dokki-output title="Run">
                            <iframe style="width: 100%;
                                           height: 200px;
                                           border: none;"
                                    srcdoc="
                                    <style scoped>
                                        body {
                                            height: 100vh;
                                            padding: 0;
                                            margin: 0;
                                        }
                                    </style>
                                    <canvas id='canvas' style='width: 200px; height: 200px;'></canvas>
                                    <script src='https://www.tarpeeksihyvaesoft.com/experimental/retro-ngon/distributable/rngon.cat.js'></script>
                                    <script>
                                        const triangle1 = Rngon.ngon([
                                            Rngon.vertex(-1+0.1, -1, 3.2),
                                            Rngon.vertex( 1+0.1, -1, 3.2),
                                            Rngon.vertex( 1+0.1,  1, 3.2)], {
                                                color: Rngon.color_rgba(0, 150, 255),
                                                isWavy: true,
                                        });

                                        const triangle2 = Rngon.ngon([
                                            Rngon.vertex( 1-0.1,  1, 3.2),
                                            Rngon.vertex(-1-0.1,  1, 3.2),
                                            Rngon.vertex(-1-0.1, -1, 3.2)], {
                                                color: Rngon.color_rgba(0, 150, 255)
                                        });

                                        const background = Rngon.ngon([
                                            Rngon.vertex(0, 0),
                                            Rngon.vertex(200, 0),
                                            Rngon.vertex(200,  200),
                                            Rngon.vertex(0,  200)], {
                                                allowTransform: false,
                                                color: Rngon.color_rgba(255, 255, 255)
                                        });
                                        
                                        const mesh = Rngon.mesh([background, triangle1, triangle2]);
    
                                        (function render()
                                        {
                                            Rngon.render('canvas', [mesh], {
                                                depthSort: 'none',
                                                useDepthBuffer: false,
                                                pixelShader: ({renderWidth, renderHeight, fragmentBuffer, ngonCache, pixelBuffer})=>
                                                {
                                                    const timer = (performance.now() / 300);

                                                    for (let y = 0; y < renderHeight; y++) {
                                                        const horMagnitude = 7;
                                                        const verMagnitude = ((y / renderWidth) * 10);
                                                        const cos = (horMagnitude * Math.cos(timer + verMagnitude));

                                                        for (let x = 0; x < renderWidth; x++) {
                                                            const dstIdx = (4 * (x + y * renderWidth));
                                                            const srcIdx = (4 * (Math.min((renderWidth - 1), (x + horMagnitude + ~~cos)) + y * renderWidth));
                                                            const fragment = fragmentBuffer[srcIdx / 4];

                                                            if (!ngonCache[fragment.ngonIdx].material.isWavy) {
                                                                continue;
                                                            }

                                                            pixelBuffer[dstIdx + 0] = pixelBuffer[srcIdx + 0];
                                                            pixelBuffer[dstIdx + 1] = pixelBuffer[srcIdx + 1];
                                                            pixelBuffer[dstIdx + 2] = pixelBuffer[srcIdx + 2];

                                                            pixelBuffer[srcIdx + 0] = 255;
                                                            pixelBuffer[srcIdx + 1] = 255;
                                                            pixelBuffer[srcIdx + 2] = 255;
                                                        }
                                                    }
                                                }
                                            });

                                            window.requestAnimationFrame(render);
                                        })();
                                    </script>"
                                    >

                <dokki-topic title="RallySportED">
                    <p>
                        A multi-platform asset-editing toolset for the cult DOS game Rally-Sport. RallySportED
                        lets you create and edit tracks, textures, and various other aspects of the game. Currently
                        focused on running in the browser (RallySportED-js), but over the years there have been native
                        versions for DOS, Windows, and Linux.
                    </p>

                    <p>
                        The browser version of the toolset fully reproduces the game's unique software-rendered 3D
                        graphics. It also allows modded content to be played directly in an in-browser DOSBox, and
                        comes with WebRTC data streaming to easily share your creations with friends.
                    </p>

                    <p>
                        The Windows version (now deprecated) supported Windows 95 and up (Wine-compatible), and
                        provided 3D rendering via OpenGL, Glide, and software.
                    </p>

                    <p>
                        The 16-bit DOS version (now deprecated, except for the backend) was written in assembly and
                        C/C++, and could run on 386-class PCs (486 or Pentium recommended).
                    </p>

                    <p>
                        Made between 2016-2021.
                    </p>
            
                    <p>
                        Tech used: JavaScript, 386 assembly, C, C++, IDA

                <dokki-topic title="Cloud simulation">
                    <p>
                        Ever wanted a cloud physics simulator and renderer? Maybe not, but Ifu
                        provides. Condensation from moist rising air is simulated and rendered
                        into realistic images of clouds. You can configure the atmospheric
                        properties as you like and view the state of the simulation as it runs.
                        Naturally simulates various cloud effects like pilei.
                    </p>

                        Hosek&ndash;Wilkie 2012 sky model to approximate Rayleigh scattering.
                        Uses volumetric photon mapping to speed up the rendering of in-cloud

                        Requires a beefy computer and some knowledge of cloud-related
                        atmospheric processes.
                    </p>

                    <p>
                        Made between 2013-2014.
                    </p>

                <dokki-topic title="U7DCP">
                    <p>
                        Patches a bug/feature in Ultima 7 that forces the CPU cache on at launch.
                    </p>

                    <p>
                        Ultima 7 &ndash; like many programs of the time &ndash; will run too fast
                        on PCs that are much newer than what the game was originally made for. One
                        way around this is to disable the CPU's cache, heavily reducing its
                        performance and thus making it more compatible with the game.
                    </p>

                    <p>
                        Unfortunately, Ultima 7 also uses the somewhat uncommon unreal memory addressing
                        mode, and apparently unnecessarily resets all CPU flags while entering this
                        mode. Since the flags include the 'CPU cache off' bit, resetting them will
                        (re-)enable the CPU cache, making it impossible to actually run the game
                        with the CPU cache off.
                    </p>

                    <p>
                        This patch modifies the game's executables so that they preserve the value
                        of the CPU cache bit. The CPU cache can then remain off and the game will
                        run quite well even on modern CPUs &ndash; provided that the PC also has a
                        compatible sound card.
                    </p>

                    <p>
                        Thanks to a member (name forgotten) of the VOGONS forum for discovering
                        that the bug had to do with the game resetting CPU flags.
                    </p>

                    <p>
                        This app is written against the multi-platform fasm assembler and should
                        be fairly straightforward to build from source.
                    </p>

                    <p>
                        Made in 2017.
                    </p>
            
                    <p>
                        Tech used: 386 assembly, IDA
                    </p>
                    
                    <p>
                        Links: <a href="https://www.github.com/leikareipa/u7dcp">GitHub</a>
                    </p>

                <dokki-topic title="KAC file format">
                    <p>
                        A binary file format for storing 3D models and their textures; a companion
                        format for the <a href="#kelpo">Kelpo</a> renderer. Designed with limitations
                        of 1990s 3D hardware in mind.
                    </p>

                    <p>
                        A KAC file stores vertices, normals and UV coordinates in 32-bit floats. Texture
                        data are stored in 16-bit color with transparency (RGBA4444); polygon colors are
                        stored in 16 bits with alpha (RGBA5551). Textures are stored with mipmapping down
                        to 1&times;1. Because a KAC file includes the model's entire set of textures, each
                        texture is associated with a 128-bit SHA-256 pixel data hash to allow duplicate
                        textures to be discarded when loading multiple KAC files.
                    </p>
                    
                    <p>
                        An importer (for loading KAC meshes into C/C++ programs) and exporter (for
                        converting OBJ models into KAC meshes) are provided. The exporter automatically
                        generates texture mipmaps and converts pixel colors into 16-bit.
                    </p>

                    <p>
                        Made between 2019-2020.
                    </p>
            
                    <p>
                        Tech used: C, C++, Qt
                    </p>
                    
                    <p>
                        Links:
                        <a href="https://github.com/leikareipa/kac-file-format/blob/master/1.0-draft/kac-1.0-spec-draft.txt">Spec (1.0 draft)</a> &bull;
                        <a href="https://www.github.com/leikareipa/kac-file-format">GitHub</a>
                    </p>
                    
                </dokki-topic>

                        voxel-based games like Delta Force and Outcast.

                        OpenMP multi-threading, and bilinear interpolation.

                        on the same depth map, first populated by the voxel renderer and then the polygon one.

                        and the Xeon E3-1230 in less than one second.
