<dokki-topic title="Introduction">
<p>VCS is a third-party capture tool by <a href="https://www.tarpeeksihyvaesoft.com">Tarpeeksi Hyvae Soft</a> for Datapath's VisionRGB range of capture hardware.</p>
<p>Its source code is <a href="https://github.com/leikareipa/vcs">available on GitHub</a>.</p>
<dokki-image src="./img/vcs-2.4-with-dialogs.webp" width="1189" height="878"     headerless  thumbnail-src="data:image/png;base64,UklGRgIBAABXRUJQVlA4WAoAAAAQAAAAEwAADgAAQUxQSEIAAAABYBPbVqNnABnIgPKbQERSgZtkBAE42Gr7nLOAiJgAHNtpv+CsO6PNYTgzXa9S3PCjXXvH1DxDROQvAYB6DeO7+QhWUDggmgAAAJADAJ0BKhQADwA+bSyRRaQioZgEAEAGxKAJ0AHoaFRB6saGecAA/uTqgey0NeRUKc3B0Pv/3Y367EPSxffAKaaae3Rcq5eRfD6jIRVevD84Z8qkyuR7w2UZAvlity3P4Cin/SDXOWBzClN+966siI+U//MeAj9TJVYlC4sNkjZjXzVj4Rx557Xcq4KWz8IEGPfvatMX/9LgAAA="><template #caption>A screenshot of VCS 2.4.0 showing the output window and some of the control dialogs</template>
                        </dokki-image>
</dokki-topic><dokki-topic title="Setting up">
<p>Assuming you've installed the drivers for your capture device, as well as unpacked the binary distribution of VCS (linked to, above) into a folder, getting VCS going is simply a matter of running its <code>vcs.exe</code> executable.</p>
<p>When you run the executable, two windows will open: a console window, in which notifications about VCS's status will appear during operation; and the <a href="#output-window">output window</a>, in which captured frames are displayed.</p>
<dokki-tip>
    You can launch VCS with command-line parameters to automate certain start-up tasks. A list of the command-line options is given in the <a href="#command-line-arguments">Command-line arguments</a> section.
</dokki-tip>
<p>When running VCS for the first time, the first thing you may want to do is adjust the capture video parameters, like phase, color balance, and so on. These can be set up via the <a href="#dialogs-video-presets-dialog">Video presets dialog</a>.</p>
</dokki-topic><dokki-topic title="Output window">
<p>The central point of the VCS user interface is the output window, where captured frames are displayed as they arrive from the capture device and having undergone any of VCS's filtering and scaling.</p>
<dokki-image src="./img/output-window.png" width="642" height="508"     headerless no-border-rounding thumbnail-src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAQCAYAAAAWGF8bAAAACXBIWXMAAC4jAAAuIwF4pT92AAAD2ElEQVQ4jV3S+VPSaRzA8e/PTTOts5sIZp7b5QUmoqAJRkgRaAJ+FTE0rwJvRLn8gomFbVqux2SHrkf6g0ftNDs7+7ftLO8dydraH575/PCaZ+b5zPMWXM11f/e1mRjuMKZGPSbGu82MdTUy2GFkwH0bn8fCuOc2Y57bBHoseNv1uC3Xcd9V47yjod2q5b5Vk+pv0RFyav4RjhaszCY8qZkRBdFHMoK9PzD1IIOH4lm2A1n8kbiENJzP7HgekYfnP3tPBo/Es+xOZvFp9qunoo8yEYYTtlT5pAvNgCal96pQd16hoq2QXJOcVb+C3XgBZZ0laHvK0PsqvvP1gILNWOGJp049JXxMXsL/vAXLWAWidAOzT4VWzOeaJZtVv5zt6WxuDqppmaqmdboOs0/51V8F5GxETz1YjSOiQ/A/tyG+HsaWaMIZ1mIdr+JWXznK1iKW/TI2o3KaJT0dszexh3VpN5762kQmb6MKmiRD2u+FtAivpTK8ix7EuAHLkBpjTwnVzjy0nlLmus6xKWUjJky4ZgzcGVJz80ExNa35aO+Xkuw+x1spJ+3tcX36vjCfaMCzOoFdaki/0B7V0RLUcKO3jIVhGevhizgeN9IuGXB856W8GJGxFs7F8dhMu6THebJywK/EFBdxxgzYxiq5N6nBEdKgtOezOPITK4EcmkN6xOlarF88qEFlz+Pl6I8sBS7SFDLQJtVxd/Q6wmaskfWlKY6lC+yHLrA1IWM3KGdrUsbW8DkOJhUcxS5zMFPMflDxnwe+eDbHUhHH8Xz2prIR/Asuqn6ViE0UEfeeJ9KfQag3A694lvdTWfz19DLxkQLmJgqQvJnf+X5Qzp9PTjyfOX8uMZ8MYXOwiNr6Yqq7i6n3VVLpvoKqrZCcW3JW/Ap2YgWUukuoeVBGve962pWn/iqgYEMqoOQbF9zJHmqnxzBFzLRP6zAPqtD9r0PjkBp7sAbxmw6LLdmsn3ZoHKrCHqr5/CkjoRoaQm3cS1hwhnXY/Bpu9StRiT+z7M/it2kFzZIB96wRe7gW20mn/eVpX5uQpTv84i0hHcLS5DVMQ004pVrMvgr0XVepbLmA2nWVx51neBfOxD7TQKtUh8mrpN5zmUp7DmrXFZ54zvAmIscxa0x7o0+FkJwz0LE+gnfBSe8TMz3JO/Q/vUtryMi6VMZuspKBly6GFh0MzNvonbfS99SCeOKRYt4llPQ+c+Kdb6Y/aUV4loiwtjrP5vZrFl9G2dpe5PdPBxwc7vDheDd9Do/fc3h0Mnc5/rjHh497HH3YY/vNCisrv7AsJdl+9YKdvQ3+BWrLl/u1mT87AAAAAElFTkSuQmCC"><template #caption>The output window - showing the Windows 98 desktop being captured on Linux</template>

<dokki-subtopic title="Magnifying glass">
<p>If you press the middle mouse button over the output window, a magnifying glass will pop up, showing an elarged view of the area around the cursor.</p>
<p><dokki-tip>The magnifying glass is not available with the OpenGL renderer.</dokki-tip></p>
</dokki-subtopic><dokki-subtopic title="Dragging">
<p>You can drag the output window by left-clicking and holding anywhere on the window.</p>
</dokki-subtopic><dokki-subtopic title="Borderless mode">
<p>You can double-click inside the output window to toggle borderless mode on/off. The F1 keyboard shortcut will also toggle this mode.</p>
</dokki-subtopic><dokki-subtopic title="Resizing">
<p>The output window - along with the frames it's displaying - can be resized via the <a href="#dialogs-output-resolution-dialog">Output resolution dialog</a>. Spinning the mouse scroll wheel over the output window will also adjust the output size.</p>
</dokki-subtopic><dokki-subtopic title="Fullscreen mode">
<p>Although you can emulate a fullscreen mode by turning off the output window's border (see <a href="#output-window-borderless-mode">Borderless mode</a>) and then scaling the window to the size of the the display area (see <a href="#output-window-resizing">Resizing</a>), there's also a true fullscreen mode available. You can toggle it on/off with the F11 shortcut key.</p>
<p><dokki-tip>For the fullscreen mode to work best, you may first need to manually resize the output window to match the resolution of your screen.</dokki-tip></p>
</dokki-subtopic><dokki-subtopic title="Title bar">
<p>The output window's title bar shows information about VCS's current operating state; e.g. the input and output resolution.</p>
<p>The title bar may contain some or all of the following elements, from left to right:</p>
<dokki-table headerless>
    <table>
        <tr>
            <th>Element</th>
            <th>Desription</th>
        </tr>
        <tr>
            <td>{!}</td>
            <td>
                The frame drop indicator. Shown when VCS is having to drop captured frames due to insufficient performance (e.g. the CPU not being fast enough for the current capture settings).
            </td>
        </tr>
        <tr>
            <td>VCS</td>
            <td>
                The program's name.
            </td>
        </tr>
        <tr>
            <td>RFOA</td>
            <td class="with-inline-table">
                <dokki-table>
                    <table>
                        <tr>
                            <th>Element</th>
                            <th>Explanation</th>
                        </tr>
                        <tr>
                            <td>R</td>
                            <td>
                                Shown when video recording is active (see <a href="#video-record-dialog">Video recorder dialog</a>)
                            </td>
                        </tr>
                        <tr>
                            <td>F</td>
                            <td>
                                Shown when the filter graph is active (see <a href="#filter-graph-dialog">Filter graph dialog</a>)
                            </td>
                        </tr>
                        <tr>
                            <td>O</td>
                            <td>
                                Shown when the overlay is active (see <a href="#overlay-dialog">Overlay dialog</a>)
                            </td>
                        </tr>
                        <tr>
                            <td>A</td>
                            <td>
                                Shown when anti-tearing is active (see <a href="#anti-tear-dialog">Anti-tear dialog</a>)
                            </td>
                        </tr>
                    </table>
                </dokki-table>
            </td>
        </tr>
        <tr>
            <td>░ &times; ░ (░ Hz)</td>
            <td>
                The current capture resolution and its refresh rate.
            </td>
        </tr>
        <tr>
            <td>scaled to ░ &times; ░ (░ FPS)</td>
            <td>
                The current output resolution and the rate at which the output is being updated.
            </td>
        </tr>
    </table>
</dokki-table>
<p>Under special circumstances, the title bar may also show one of these messages:</p>
<dokki-table headerless>
    <table>
        <tr>
            <th>Message</th>
            <th>Reason</th>
        </tr>
        <tr>
            <td>No signal</td>
            <td>
                The capture device doesn't appear to be receiving a signal.
            </td>
        </tr>
        <tr>
            <td>Signal out of range</td>
            <td>
                Either VCS or the capture device is unable to process the signal's video mode due to the mode exceeding operating parameters. For example, the input resolution may be too high.
            </td>
        </tr>
        <tr>
            <td>Invalid capture channel</td>
            <td>
                <p>
                    The requested input channel on the capture device, or the entire capture device, is unavailable for use. This could be caused e.g. by an out-of-range input channel index or the capture device driver not being installed.
                </p>
                <dokki-tip>
                    On Linux, the Datapath Vision driver must be re-installed whenever your kernel is updated &ndash; failure to do so will result in this error message. Sometimes a kernel update will break compatibility with the driver, so ensure that the driver installer finishes successfully.
                </dokki-tip> 
            </td>
        </tr>
    </table>
</dokki-table>
<p>You can also set a fully custom window title via <menu-path>Context &gt; Window &gt; Set title...</menu-path>.</p>
</dokki-subtopic><dokki-subtopic title="Context menu">
<p>Right-clicking inside the output window will bring up its context menu, which gives you access to the various controls and dialogs of VCS.</p>
<h3>Eye dropper</h3>
<p>The eye dropper is a special non-interactible element of the context menu. It shows the RGB color values of the pixel over which the context menu was opened.</p>
<h3>Input</h3>
<dokki-table headerless>
    <table>
        <tr>
            <th>Option</th>
            <th>Explanation</th>
        </tr>
        <tr>
            <td>Channel</td>
            <td>
                Set the hardware capture channel.
            </td>
        </tr>
        <tr>
            <td>Color depth</td>
            <td>
                Set the color depth with which frames are captured. This is a hardware-level setting: the capture device will convert each frame to this color depth before uploading it to system memory - thus lower color depths consume less bandwidth. Prior to display, VCS will convert the frames to the color depth of the <a href="#output-window">output window</a>.
            </td>
        </tr>
        <tr>
            <td>De-interlacing</td>
            <td>
                Set the de-interlacing mode for interlaced signals. This is a hardware-level setting. Will have no effect on non-interlaced signals (even if the captured frames exhibit interlacing).
            </td>
        </tr>
    </table>
</dokki-table>
<h3>Output</h3>
<dokki-table headerless>
    <table>
        <tr>
            <th>Option</th>
            <th>Explanation</th>
        </tr>
        <tr>
            <td>Screenshot...</td>
            <td>
                Save the current output image into an image file.
            </td>
        </tr>
        <tr>
            <td>Aspect ratio</td>
            <td class="with-inline-table">
                <dokki-table>
                    <table>
                        <tr>
                            <th>Sub-option</th>
                            <th>Explanation</th>
                        </tr>
                        <tr>
                            <td>Native</td>
                            <td>
                                Don't force captured frames into a specific aspect ratio.
                            </td>
                        </tr>
                        <tr>
                            <td>Traditional 4:3</td>
                            <td>
                                Force captured frames into a 4:3 aspect ratio for such input resolutions that historically might have been meant to be displayed as such; for example, 720 &times; 400, 640 &times; 400, and 320 &times; 200.
                            </td>
                        </tr>
                        <tr>
                            <td>Always 4:3</td>
                            <td>
                                Force all captured frames into a 4:3 aspect ratio.
                            </td>
                        </tr>
                    </table>
                </dokki-table>
            </td>
        </tr>
        <tr>
            <td>Upscaler</td>
            <td>
                Set the scaler to be used when frames are upscaled to fit the output window.
            </td>
        </tr>
        <tr>
            <td>Downscaler</td>
            <td>
                Set the scaler to be used when frames are downscaled to fit the output window.
            </td>
        </tr>
    </table>
</dokki-table>
<h3>Window</h3>
<dokki-table headerless>
    <table>
        <tr>
            <th>Option</th>
            <th>Explanation</th>
        </tr>
        <tr>
            <td>Renderer</td>
            <td class="with-inline-table">
                <dokki-table>
                    <table>
                        <tr>
                            <th>Sub-option</th>
                            <th>Explanation</th>
                        </tr>
                        <tr>
                            <td>OpenGL</td>
                            <td>
                                <p>
                                    Draw the window using OpenGL. Allows variable refresh rate output (if supported by your hardware), but is incompatible with Windows XP and the magnifying glass feature.
                                </p>
                            </td>
                        </tr>
                        <tr>
                            <td>Software</td>
                            <td>
                                Draw the window using software rendering. Performs well and supports the most features, but may not allow variable refresh rate output.
                            </td>
                        </tr>
                    </table>
                </dokki-table>
            </td>
        </tr>
        <tr>
            <td>Border</td>
            <td>
                A hint to the operating system on whether to decorate the output window with the system's window border and title bar. When the window is in borderless mode, the operating system is also asked to position it on top of other desktop elements.
            </td>
        </tr>
        <tr>
            <td>Fullscreen</td>
            <td>
                Place the output window into fullscreen mode. For best results, you should first scale the window to the resolution of your screen before entering fullscreen mode. Not properly supported on some distributions of Linux.
            </td>
        </tr>
        <tr>
            <td>Center</td>
            <td>
                Snap the output window to the middle of the screen.
            </td>
        </tr>
        <tr>
            <td>Top left</td>
            <td>
                Snap the output window to the top left corner of the screen.
            </td>
        </tr>
        <tr>
            <td>Set title...</td>
            <td>
                Give the output window a custom title. All of VCS's normal title bar information - except the frame drop indicator - will be replaced with the text you set. Setting an empty string will restore VCS's default title bar.
            </td>
        </tr>
    </table>
</dokki-table>
</dokki-subtopic></dokki-topic><dokki-topic title="Dialogs">
<p>The VCS user interface includes a number of dialogs, with which you can adjust the program's operational parameters.</p>
<dokki-subtopic title="Video presets dialog">
<p>To access: <key-combo>Ctrl + V</key-combo> or <menu-path>Context &gt; Input &gt; Dialogs &gt; Video presets</menu-path></p>
<p>The video presets dialog lets you to modify the capture devices's video signal parameters.</p>
<dokki-image src="./img/video-presets-dialog.png" width="513" height="656"     headerless no-border-rounding thumbnail-src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAaCAYAAAC3g3x9AAAACXBIWXMAAC4jAAAuIwF4pT92AAAEFklEQVRIiZ1VWUszWRTs/6MRQdxiOunO3olJxySaxAVRHKNRXMEHdwWdqKAiiAtuuO+4BAT1X83TvKSGOtLi5+fDxzwU957udJ0659S9UUKG79+YGUJ7W6bYlIwhk06gpbkRrS1NSKfiEvO936chGHAj4Cf0X+D16cVEUMdfYdc/SjIeQYNpFCNhP8KGF6GgB9F6P8xIEHxWH/LCIJFPQ8D/O4JcfRrCAa0Y8jiguHWtaAQD8Hj0otfD7D64dQ2qWgdVdcCpOuByqnC5LDi/7NWP2KkWNc2FmpqaouJ2u5FKpRGPx5FMJpFpbpbVMAyEQiEB90QwSAR/hGEYsNvtUJxOJ2KxmHzY0NCA1tZWtLe3o6OjA21tbYKuri55xqQ/IZFIiIja2hoo1dXVcDgcwv4dtbW1gu/xT7Db7SCXlNzU1ASPxwNVVf8XnE4nNE1DMpmAEggEsLOzg/39fVxfX+P5+RlPT09/hMfHR/n97e2tlN6TzUJhBvaI6Ovrw/DwMEZGRjA6Ovobvr+z9oODg/D7/ejp6fkgZLm6rgvYi7KyMpSWlqKkpOQTjCsqKlBeXg6bzSaxBZvNJqXncjkoJONk2cd0Og3TNNHf34+ZmRnMzs4K5ubmMD09LW7IZrOYmJjA1NQUJicnZR0fH0c4HP5QyKGQkJZhH2ifhYUFXF5e4u7uTvpzf3+Pq6srscfq6ipeXl7w9vaG19dXvL+/o1AoyLfd3d1QWGYmk5EHVPdp8ExGVHNolnF9Ph+Wl5dxenoqQ+FACoWCJKUgIWQzaWLLpPyY8iORiKxfQXK2hRV9RUtLi7zr7e2FQlOzTGYnORVbe/bX6/VKTLA9hDVAes/lcgkYy1A4HapiBv6YCej4yspK1NXVoaqqSvYWGFugIxwOh4CkQmidFPaNZVIZ/Tg0NCQx9/QbY/rQAr3HPtfX10s7+F0u1wuFzGwoB2KVenBwgJubG3m+t7eHh4cHabwFTv/i4kISRaNRScwKaSkhtCZMlczIo3h0dCS+29jYwMnJicTE4eHh5zowMCBk/IaErOIXhVw5ICqkD0m4tbUlHjw7OxNVVE6Vi4uL0jPTNBEOhYSU94EQNjY2imkt2zC7Rbi5uYnz83Mh3N3dFaKlpSU5wzwZJgnDYSGkciFMpVJCSPm0Cgl4Ovjj7e1tuYWojOQsk2RjY2OymqYpVZGQQj4V8qHlQUonKfdra2uijtnZSz4nmIBxNBqV+5AnSQjpQyojIRtLI/PQz8/PSylUwsuBlwXBS4JguZ2dnaLMOl3Hx8cfZ5nHiWVzKHzJs8qSGbNvtAkHQ7D8y8srIadH2Wdr0uvr61CqqiqFXde1z9NBBYuLCwgE/HI9raysIJ/PyzCWlvJyQeTzf8sfGCsiPv5bavAfIIlO1rNQ8yYAAAAASUVORK5CYII="><template #caption>The video presets dialog - showing controls for adjusting the capture device's video signal parameters</template>
                        </dokki-image>
<p>A given video preset's parameters will be applied when all of its &quot;Activates with&quot; conditions are met. For instance, if you've defined a preset's activation resolution as 800 x 600 and have disabled the other activating conditions, the preset's parameters will be applied when the capture video mode is 800 x 600.</p>
<p>To add or delete a preset, click the + or - buttons next to the preset selector at the top of the dialog. Clicking the + button while holding the Alt key will create a new preset with the current preset's settings.</p>
<p>If you want your changes to the video presets to persist after you exit VCS, remember to save them first! This can be done via <menu-path>File &gt; Save as...</menu-path>. Saved settings can be restored via <menu-path>File &gt; Open</menu-path>. Any saved settings that're open when VCS exits will be reloaded automatically when you run VCS again.</p>
</dokki-subtopic><dokki-subtopic title="Alias resolutions dialog">
<p>To access: <menu-path>Context &gt; Input &gt; Dialogs &gt; Aliases</menu-path></p>
<p>With the alias resolutions dialog, you can instruct VCS to automatically override certain capture resolutions.</p>
<p>For instance, if you find that your capture device is displaying 640 × 400 as 512 × 488 (or something to that effect), you can define 640 × 400 as an alias of 512 × 488. Whenever the capture device reports a new video mode of 512 × 488, VCS will tell the device to use 640 × 400, instead.</p>
</dokki-subtopic><dokki-subtopic title="Video record dialog">
<p>To access: <key-combo>Ctrl + R</key-combo> or <menu-path>Context &gt; Output &gt; Dialogs &gt; Video recorder</menu-path></p>
<p>The video recorder gives you the option to stream captured frames into a video file.</p>
<p>To use the video recorder in Windows, you'll need to install the 32-bit version of the <a href="https://sourceforge.net/projects/x264vfw/files/x264vfw/44_2851bm_44825/">x264vfw</a> codec and run its configurator at least once, so that its settings are added into the Windows registry for VCS to find.</p>
<p>The recorder will write frames as they appear in the <a href="#output-window">output window</a> into a video file, with the following caveats:</p>
<ul>
<li>Audio won't be recorded.</li>
<li>Frames will be inserted into the video at the rate of capture; the recorder doesn't try to maintain any particular frame rate (e.g. by duplicating or dropping frames). For example, if your capture source is 57.5 Hz, one minute of video will have 57.5 * 60 frames, and if that video is played back at 60 FPS, it will appear slightly sped up.</li>
<li>If VCS drops any frames during recording (e.g. due to insufficient system performance), the video's playback will be non-linear. So if you're recording a separate audio file and are planning to sync it with the video, you want there to be no frames dropped while recording the video.</li>
<li>The video will be recorded in the H.264 format using an x264 codec.</li>
<li>The video resolution will be that of the current output size (see <a href="#dialogs-output-resolution-dialog">Output resolution dialog</a>).</li>
<li>The output size can't be changed while recording; all frames will be scaled automatically to fit the current size.</li>
<li>The <a href="#dialogs-overlay-dialog">overlay</a> won't be recorded.</li>
<li>Encoder parameters influencing image quality (e.g. CRF) can't be customized in the Linux version of VCS. This is a limitation of OpenCV. You can, however, modify and recompile the OpenCV code with higher-quality default options (see e.g. <a href="https://www.researchgate.net/post/Is_it_possible_to_set_the_lossfree_option_for_the_X264_codec_in_OpenCV">here</a>).</li>
</ul>
<h3>Recorder settings</h3>
<dokki-table headerless>
    <table>
        <tr>
            <td>Nominal FPS</td>
            <td>
                The video's suggested playback rate. This setting doesn't affect the recording rate, only the rate at which the video might be played back by your video player. The actual recording FPS will be determined by the capture source's refresh rate.
             </td>
        </tr>
        <tr>
            <td>Additional x264 arguments</td>
            <td>
                Put in this field any custom x264 command-line arguments.
            </td>
        </tr>
    </table>
</dokki-table>
<p>For best image quality regardless of performance and/or file size, you can try the following settings:</p>
<dokki-table headerless>
    <table>
        <tr>
            <th>Setting</th>
            <th>Value</th>
        </tr>
        <tr>
            <td>Video codec</td>
            <td><em>x264</em></td>
        </tr>
        <tr>
            <td>Profile</td>
            <td><em>High 4:4:4</em></td>
        </tr>
        <tr>
            <td>Preset</td>
            <td><em>Ultrafast</em></td>
        </tr>
        <tr>
            <td>Pixel format</td>
            <td><em>RGB</em></td>
        </tr>
        <tr>
            <td>CRF</td>
            <td><em>0</em><sup>*</sup></td>
        </tr>
        <tr>
            <td colspan="2">
                <sup>*</sup>Increasing the CRF value to 10&ndash;14 will considerably reduce the size of the resulting video file while maintaining high image quality.
            </td>
        </tr>
    </table>
</dokki-table>
<p>To reduce file size while maintaining high image quality, you can try lowering Preset to <em>Veryfast</em> or <em>Faster</em> and increase CRF to <em>10</em>–<em>15</em>. For more tips and tricks, you can look up documentation specific to the x264 encoder.</p>
<p>If the recorder dialog indicates that frames are being dropped while recording, try to select recording options that require less CPU or IO performance.</p>
<ul>
<li>Dragging or otherwise interacting with GUI items (e.g. dialog windows) during recording may cause transient frame drops.</li>
<li>During recording, frames will be saved to disk in batches. If you get a bunch of frames dropped every couple of seconds but no drops otherwise, insufficient disk performance may be the reason (i.e. writing the batch of frames takes too long).</li>
</ul>
</dokki-subtopic><dokki-subtopic title="Input resolution dialog">
<p>To access: <key-combo>Ctrl + I</key-combo> or <menu-path>Context &gt; Capture &gt; Dialogs &gt; Resolution...</menu-path></p>
<dokki-warning>
    Not available on Linux.
</dokki-warning>
<p>Normally, the capture device will automatically set the capture resolution to match that of the input signal, but sometimes the result isn't quite right. The input resolution dialog lets you override this resolution with your own one.</p>
<p>You can change a button's assigned resolution by clicking on it while pressing the <key-combo>Alt</key-combo> key.</p>
</dokki-subtopic><dokki-subtopic title="Output resolution dialog">
<p>To access: <key-combo>Ctrl + O</key-combo> or <menu-path>Context &gt; Output &gt; Dialogs &gt; Resolution...</menu-path></p>
<p>The output resolution dialog lets you resize the output window. This also resizes the frames being displayed in the window.</p>
<p><dokki-tip>The output resolution controls are not available while recording video (see <a href="#dialogs-video-record-dialog">Video record dialog</a>).</dokki-tip></p>
<h3>Controls</h3>
<dokki-table headerless>
    <table>
        <tr>
            <td>Resolution</td>
            <td>
                Lock the size of the output window so that changes to the capture resolution don't affect the output resolution. Frames will be scaled up or down as needed to match this resolution.
             </td>
        </tr>
        <tr>
            <td>Relative scale</td>
            <td>
                Scale the size of the output window up or down by a percentage of its base size. The base size is either the capture resolution, or, if enabled, the locked output resolution.
            </td>
        </tr>
    </table>
</dokki-table>
</dokki-subtopic><dokki-subtopic title="Overlay dialog">
<p>To access: <key-combo>Ctrl + L</key-combo> or <menu-path>Context &gt; Output &gt; Dialogs &gt; Overlay...</menu-path></p>
<p>The overlay dialog lets you define a message to be overlaid on the <a href="#output-window">output window</a>.</p>
<dokki-image src="./img/overlay-dialog.png" width="878" height="508"     headerless no-border-rounding thumbnail-src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAALCAYAAAB/Ca1DAAAACXBIWXMAAC4jAAAuIwF4pT92AAAC+ElEQVQokT2PWU8TcRTF/yR+BT+BUYnRxAWDlhYsUCgajYYgxJqg4L4lJsaiKG5REeKCiAsaF6pATCBAmLaCbFNpawsMaosPNdEHEqTtdIYOHSgzzDEzKie5uffch3t+l6xbt1ZJTV2JVWvMyur1FqSm7cMG4xGYLZdhslxC3oGryC27hpxD15Bz7AaMZ2qkwmNnYdq182FR8W6yo3DPMlO2PsWUY0hZvik9hTTcqMSjq1XK01u38fhmLe7W3sfzV6/RNziI3oEBDLhc6HfR6KNp9A4NYsjrkd69b0bV9csPTp0+TFQZdBuJXreRrNicRgjloBS3ZxBe77AyPvYZgW+jmAgycDo6cfzoAZw6UY6Tx8tQVlqCg6UlKN2/Vyk/aMF+S9HvPFOWp8Cc7TPnZ/sK8rN9ReYsN3nZ/wGOiV/4xSYwn5QhJqawMPcTwaAX2wuMyM/PQ26uEfqMrTBuy4RBr0N6epqi06Uj05ChebUyDTroM7aAvO+nMc2xUKUASIgJzIkCGOYrqqtr0NHRAYqiQFF2dHdTsNsdit1uV/2iw+GUe3p6ZKfTKdMul2y1WmXCfP8Bjg1jNiFgPpmEIMyAi03D7x9Be3s7pqamEIux4DgObDQKlmWXfCKR0EAkSdJ647NnIBzPY2FhAZIka8t4XADPC/jkcqGrqxOzs7MIBoPweDxgGAaBQACTk5MIh8MQBAHxeFw7rigK6uvrQcR/KepCVSSiEnD4NEyDoroRi8UQCoXg8/m1PjMzo6hkgiAsiqIoiaIoC4Kg0siPGxpkoqaoWlz8S6i+HI9zcLs9aGtr00ii0Sh4ntNI1AA2GlV4ntdmtSKRiPZlXV0dSDKZ1A791/z8nPZKKBREY+MTNLe0oqnJhhcvXsNms6HJ9lZpaW1FTc2dn+et5zovVlZQFResVNWVS1RxSRFFPG4a419G4R9xgRkbRiDAgGFGEAz4MDExhvHxUfj8XvT2fgRN92HEOyQxPjc6utruhaNhAmCpmt7YyB/MAJLdq880WAAAAABJRU5ErkJggg=="><template #caption>The overlay dialog - showing controls for overlaying a message on the output window</template>
                        </dokki-image>
<p>You can combine normal text with pre-set VCS variables and HTML/CSS formatting to create a message to be shown over the output window.</p>
</dokki-subtopic><dokki-subtopic title="Anti-tear dialog">
<p>To access: <key-combo>Ctrl + A</key-combo> or <menu-path>Context &gt; Output &gt; Dialogs &gt; Anti-tear...</menu-path></p>
<p>The anti-tear dialog provides functionality to remove tearing from captured frames.</p>
<dokki-image src="./img/anti-tear-dialog.png" width="489" height="502"     headerless no-border-rounding thumbnail-src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAVCAYAAABG1c6oAAAACXBIWXMAAC4jAAAuIwF4pT92AAADE0lEQVQ4jaVUSUsjYRDNDxoFddQkqEnH3pKYtTuLSZBEiKigBxH0ElRE8aBC4i56UNwVRcGD+qfmOKd+w6ux44g4OMzhUdXf1/Xq1dLtCZvqz0Q8jELedgp5GxkrgVw2DV1TYBghGHoIpvEb9N+gNKFqipMJK6hGgz88ViqK4qDllAo20skIYlEdAxENph6EqStfgqEriJuKE1d74QkpAScaMWEamhMM9kFRAgi9QuHz1+AElQC8Pq/jCYX6kclkYFk2bNtGNptFPp9HOBIB71RVg6qqn6Kf6O+HYRjw+Xzw9PX1IZVKIZVKIp1OI5FIIBwOo1IpC3kymXy9/wi+b9s2YrGYkDcJ05YlFwwmGVEqlTA4OCjqqZjk9An6BJMnk0khpO8nYW9vrxwQlK0oCnRdlwBXgUtCn2eWZQnc5KZpIhqNvi+ZmZglGAyiUqlgZ2cHMzMzQrK3t4exsTEsLCxgf38fm5ubAvqLi4tCytgPhPF4HHweHx/H8/MzVlZWUCgUcHd3h62tLSwvL+Pk5AS3t7e4vr7G/f29EEciEYn3vx9KSmRT4dDQEDY2NjA9PS2lkYyBw8PDqNVqaDQaWFtbE1ur1aRVAwMDbwrZPx7QBgIBITw4OGgSVqtVKY1J1tfXBSSs1+tCyB4ytqnQbTyDOZTR0VE8PT1JiSx5aWlJSC4vL3F1dSX24uJCSm80Gs2SmwpJxgN3clT0+PgoQyDh0dERJiYmZDinp6c4Pj4WnJ+fY3V1VWLi8T+G4q4Ce8g1GhkZwcPDA+bn52UfWerU1JQQk4iWODs7E8IPCt294ui5g1yRl5cXKblYLIqS2dlZUXhzc/Ou5Hq9LoSy2P7XxaZCZqBlczmUw8ND2UMm2t3dxeTkpAxge3tb+kbQn5ubkykzThR2d3ejp6dH4Pf75ZC2q6sLvPN6vejs7BTLZ/q8I1zf9xrzvaMDHn7U/FY5GJbLP4emaf8EVVXf/jYk4MK6q5PL5f76u/oMFNMkLJfLopJgL5mVGfnSV8HVYdme1tZWtLW1/Tfa29vR0vINvwAm11MmpqZs5QAAAABJRU5ErkJggg=="><template #caption>The anti-tear dialog - showing controls for adjusting the parameters of VCS's anti-tear engine</template>
                        </dokki-image>
<p>Under some circumstances, like when the captured source doesn't sync its rendering with the refresh rate, captured frames can contain tearing. VCS's anti-tearer helps mitigate this issue.</p>
<p>Anti-tearing should be considered an experimental feature of VCS. It works well in some cases and not that well in others. It'll completely fail to work if the captured source redraws the screen at a rate higher than the capture's refresh rate - e.g. a game running at 100 FPS with a refresh of 60 Hz.</p>
<h3>Settings</h3>
<dokki-table headerless>
    <table>
        <tr>
            <td>Scan start</td>
            <td>
                Set where the anti-tearer begins scanning each frame for tears. Static screen-wide content like a game's UI bar can prevent the anti-tearing from working, so you should set this value so that such content is excluded. You can choose to visualize the scan range to help you set it up.
             </td>
        </tr>
        <tr>
            <td>Scan end</td>
            <td>
                Same as <strong>Scan start</strong> but for where the scanning should end. This is an offset from the bottom of the screen up, so e.g. a value of 5 at a resolution of 640 &times; 480 would mean the scanning ends at pixel row 475.
            </td>
        </tr>
        <tr>
            <td>Scan direction</td>
            <td>
                If the captured source redraws its screen from bottom to top, set the scan direction to <em>Down</em>. Otherwise, use the <em>Up</em> setting. Using the wrong direction will fully prevent the anti-tearing from working (it may correctly detect tears but won't be able to remove them).
            </td>
        </tr>
        <tr>
            <td>Scan hint</td>
            <td>
                If the captured source redraws its screen at a rate higher than half of its refresh rate but lower than the full refresh rate (e.g. 35 FPS at 60 Hz), you may (or might not) have better results and/or performance by setting this option to <em>Look for one tear per frame</em>. Otherwise, use the <em>Look for multiple tears per frame</em> setting.
            </td>
        </tr>
        <tr>
            <td>Visualization</td>
            <td>
                Draw certain anti-tearing-related markers in the <a href="#output-window">output window</a>.
            </td>
        </tr>
        <tr>
            <td>Threshold</td>
            <td>
                The anti-tearer compares adjacent frames to find which parts of the new frame may be torn (where pixels from the previous frame are still visible). This setting controls the amount by which a pixel's color values are allowed to change between frames without the pixel being considered new (given inherent noise in analog pixels). In an ideal situation where there's no noise in the captured signal, you can set this to 0 or close to it. Otherwise, the value should be high enough to exclude capture noise.
            </td>
        </tr>
        <tr>
            <td>Window size</td>
            <td>
                When scanning frames for tears, the anti-tearer will average together a bunch of horizontal pixels' color values to reduce the negative effect of analog noise. This setting controls the pixel size of the sampling window. Lower values will result in better performance but possibly worse tear detection.
            </td>
        </tr>
        <tr>
            <td>Step size</td>
            <td>
                The number of pixels to skip horizontally when scanning for tears. Higher values will improve performance but may cause a failure to detect subtler tears.
            </td>
        </tr>
        <tr>
            <td>Matches req'd</td>
            <td>
                Set how many times the sampling window must find a pixel's color values to have exceeded the detection threshold for a horizontal row of pixels to be considered new relative to the previous frame. Higher values should reduce the chance of false positives but may also cause a failure to detect subtler tears.
            </td>
        </tr>
    </table>
</dokki-table>
</dokki-subtopic><dokki-subtopic title="Filter graph dialog">
<p>To access: <key-combo>Ctrl + F</key-combo> or <menu-path>Context &gt; Output &gt; Dialogs &gt; Filter graph...</menu-path></p>
<p>The filter graph dialog lets you to create chains of image filters to be applied to captured frames prior to display in the <a href="#output-window">output window</a>.</p>
<dokki-image src="./img/filter-graph-dialog.png" width="1187" height="556"     headerless no-border-rounding thumbnail-src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAJCAYAAAAywQxIAAAACXBIWXMAAC4jAAAuIwF4pT92AAACo0lEQVQokR3PzUsUcQCH8bFT0J+QEgm6+bbzovOyO+6bu2sz667LvvhSrho7rii+QJi12xo6vpFQlutszYZR2qFIIqQIPHiQCDU8FR06dAsiOkannX7fyNNz+VweKte4TfKtg5hJ1ZMZPYqZJ6PIv55Hfvs5ss9mkX1cg6zZZuXWr+DmavZzZnTu9BkWVPbp2qnl492K5cXpihu5sQpN66r49PsXRZnMdzyqi5FSbQ1KDf3YkFdwv28Tmfw1jM+OYOxWEOmrChkYieByuuuPqgQ+dqjBQzXoO1ICnkNV8R+qF/2HoVDwKB7yH1BrqQNiJBmsh3iy7tHwkL2HRdsGOHsT7PWNaKhlYKttAi3JhGY5MLQddXUXwIoCWlpl0LQdtL3ppKIogCrMv0Jx5jyMqTYYY2MoZUpYSG7BIcvQhjR0JRPo6k+R5kgHvIpCeru7rYw2ZPmTCUuOxywtnbZ6enqsaDRqMSxrUYUXt1HcqoRRisBYm4J5dwuL0y8hSRJisRgikU5EOzvhFEUkkgmkNQ2Tk5PojETQ6nSeGDUahRoOg2NZUIVvgyh+rYZx3A1jLw/z3TaWim/AsRzs/3cYBnRjI2G9HnA+L7HV1JBzVVXE5nYRe6SDtDAM4XmesC4XYXxeQhWyMoqbdhj7AzC+LMD88RZL73fRwjZD4HkIvAC+hScOyYne3kskl8tZKysr5b5Uqhxsby/rul7e2dkpm6ZZliSpTBUqbSiedcKoHYbhugMzvYfF6/tgRB6cKICTmsFKLDiJJg4Xj1BIRTweR1ubDw6HBL/fj3A4DEVRIAg8qEKiGkU1CMM1CYMu4kH1B6xWH2Bc5DHByRhn4xgXMn8nlDyG+/SfLrdzSeTZOa9H1gN+t+5xO3SH1Ky3B326qgT0f5yhZZjrkJb3AAAAAElFTkSuQmCC"><template #caption>The filter graph dialog - showing controls for creating and modifying filter chains</template>
                        </dokki-image>
<p>The filter graph is made up of nodes that can be connected together in a chain. These nodes come in three varieties: <em>input gate</em>, <em>output gate</em>, and <em>filter</em>.</p>
<p>The input and output gates determine the resolutions for which the connected filters will be applied. For instance, if you set an input gate's width and height to 640 and 480, and the width and height of an output gate to 1920 and 1080, any filters you connect between these two nodes will be applied when the size of the output window is 1920 x 1080 and the original resolution of the frames (i.e. the capture resolution) is 640 x 480. You can also use the value 0 for a gate's width and/or height to allow VCS to match any value to that dimension: an input gate with a width and height of 0, for instance, will apply the connected filters to frames of all capture resolutions, provided that they also meet the resolution specified for the output gate. A filter graph can have multiple chains of these input-filter-output combos, and VCS will select the most suitable one (or none) given the current capture and output resolutions.</p>
<p><dokki-tip>When deciding which of multiple filter chains to use, VCS will prefer more specific chains to more general ones. If you have e.g. an input gate whose width and height are 0, and another input gate whose width and height are 640 and 480, the latter will be used when the capture resolution is exactly 640 x 480, and the former otherwise. Likewise, if your input gates are 0 x 0 and 640 x 0, the former will be applied for capture resolutions of <em>any</em> x <em>any</em>, except for 640 x <em>any</em>, where the latter chain will apply - except if you also have a third input gate of 640 x 480, in which case that will be used when the capture resolution is exactly 640 x 480.</dokki-tip></p>
<p>To connect two nodes, click and drag with the left mouse button from one node's output edge (square) to another's input edge (circle), or vice versa. A node can be connected to as many other nodes as you like. To disconnect a node from another, right-click on the node's output edge, and select the other node from the list that pops up. To remove a node itself from the graph, right-click on the node and select to remove it. To add nodes to the graph, select <code>Add</code> from the dialog's menu bar.</p>
</dokki-subtopic></dokki-topic><dokki-topic title="Mouse and keyboard shortcuts">
<p>You can make use of the following mouse and keyboard shortcuts:</p>

                <dokki-code    headerless>
                    <template #code>
                        <pre>Double-click
VCS's output window ..... Toggle window border on/off.

Middle-click
output window ........... Magnify this portion of the output window.

Left-press and drag
output window ........... Move the window (same as dragging by its title bar).

Right-press
output window ........... Open the context menu.

Mouse wheel
output window ........... Scale the output window up/down.

F11 ..................... Toggle fullscreen mode on/off.

Ctrl + A ................ Open the anti-tear dialog.

Ctrl + F ................ Open the filter graph dialog.

Ctrl + V ................ Open the video settings dialog.

Ctrl + I ................ Open the input resolution dialog.

Ctrl + O ................ Open the output resolution dialog.

Ctrl + R ................ Open the record dialog.

Ctrl + L ................ Open the overlay dialog.

Ctrl + Shift + key ...... Toggle the corresponding dialog's functionality on/off;
                          e.g. Ctrl + Shift + R to turn recording on/off.

Ctrl + 1 to 9 ........... Shortcuts for the input resolution buttons on the
                          control panel's Input tab.

Shift + 1 to 2 .......... Set the input channel index.
</pre>
                    </template>
                </dokki-code>
            
</dokki-topic><dokki-topic title="Command-line arguments">
<p>Optionally, you can pass one or more of following command-line arguments to VCS:</p>

                <dokki-code    headerless>
                    <template #code>
                        <pre>-v &lt;path + filename&gt; .... Load video presets from the given file on start-up.
                          Video preset files typically have the .vcs-video
                          suffix.

-f &lt;path + filename&gt; .... Load a custom filter graph from the given file on
                          start-up. Filter graph files typically have the .vcs-
                          filter-graph suffix.

-a &lt;path + filename&gt; .... Load alias resolutions from the given file on start-
                          up. Alias resolution files typically have the .vcs-
                          alias suffix.

-i &lt;input channel&gt; ...... Start capture on the given input channel (1...n). By
                          default, channel #1 will be used.
</pre>
                    </template>
                </dokki-code>
            
<p>For instance, if you had capture parameters stored in the file <code>params.vcsm</code>, and you wanted capture to start on input channel #2 when you run VCS, you might launch VCS like so: <em>vcs.exe -m &quot;params.vcsm&quot; -i 2</em>.</p>
</dokki-topic>
