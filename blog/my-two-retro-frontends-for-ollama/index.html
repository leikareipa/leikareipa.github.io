<dokki-topic title="My two retro frontends for Ollama">
<p>I spent a few evenings coding up a couple of retro web frontends for local Ollama, one loosely in the likeness of ICQ on Windows 95 and the other a DOS prompt. They both use my Windows 95 lookalike JavaScript UI framework.</p>
<p>The ICQ one is kinda like ICQ as you'd guess, with some differences and called ACQ. It uses a system prompt to get the LLM into a 1990s instant messaging frame of mind. Seen here running on <a href="/">my desktop</a>, powered by Llama 3 8B:</p>
<dokki-image src="./acq.webp" width="1920" height="1130"     headerless="true"  no-border-rounding="true"  thumbnail-src="data:image/png;base64,UklGRsYAAABXRUJQVlA4ILoAAACQBACdASoUAAwAPm0qkUWkIqGYBABABsSgCdMoR3JoAra9lNANwn+Gbq2qvMAA/tzjBb+L9FtS/sN3ltFXNu62Ari5/4LXMcO/cKw109wOKQU/4zaEi1LBe2wzi0PVSDyjNeSHKZjc4yB2nbIy9QJcoZD4YPdz91A4U9TBSIkc0KewHkiot+ihKfL/q4fX6YZyDOxcdIoO9QfQm3dITxwgGSnmqviD9zE/yVSocLO8yQ2lv9gUrTGGAAA=">
                        </dokki-image>
<p>The DOS one is called <a href="/desktop/$apps/aidos/?model=">AI-DOS</a> and is what you'd expect:</p>
<dokki-image src="./aidos.png" width="1124" height="610"     headerless="true"  no-border-rounding="true"  thumbnail-src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAALCAYAAAB/Ca1DAAAACXBIWXMAAC4jAAAuIwF4pT92AAAA00lEQVR4nJ2S6QqEMBCDW6961BMvBEHf/yGzZFDZ7iIeP4I6yNdMUqWUwreMMbDWIssy+L4Pz/OgtRb9/nsi5QzyPEfTNAIty1KeSZIgDMN3QGsthmFAURQCiqJIRId0GwTBlVv153CapgPKGSF932McR3RdJ+BLoN5Oresay7Jgnme0bSszrstD1nWVbB+tbLZS4jh2VtuLuVGOcgbMjS65Llu+WQROgWmaSk5UVVVXeeEWkA55dZghvx86dQfMbr9/XJutU2z6FZClUATs7w8uNT5M7+U597UBbwAAAABJRU5ErkJggg==">
