<dokki-topic title="LLM performance in retro assembly coding">
<p>How well can the various publically-available LLMs assist you in retro assembly coding? Here's seven of them compared.</p>
<dokki-subtopic title="Results">
<p>Each of the seven LLMs was given a set of discrete tasks to create various beginner-level MS-DOS 386 assembly programs in COM format using the FASM syntax.</p>
<p>For example: &quot;Write a DOS COM program that asks the user for a word and prints it out. Use 386 assembly in the FASM syntax.&quot;</p>
<p>Here's how they did:</p>

<p>A score of 0% means the code failed to compile, 25% means the code compiled but was very buggy, 50% means the code worked somewhat as intended but not perfectly, 75% means the code worked as intended, and 100% means the code worked as intended and the implementation went the extra mile in including relevant bonus features or had a particularly good presentation.</p>

<p>It's an interesting ordering of models, given that regular GPT-4 beats GPT-4 Turbo so clearly.</p>
<p>Besides training data, which I assume would've been similar between GPT-4 and GPT-4 Turbo, if we assume that the size of a model affects its ability to perform in these more obscure tasks, we might guesstimate model parameter counts:</p>
<ul>
<li>DeepSeek Coder is known to have 33 B,</li>
<li>Mistral Large might be 120 B since Mistral Medium may have 70 B as per the leaked model of Jan 2024,</li>
<li>which might put GPT-4 at 150 B (whether MoE or not)</li>
<li>and GPT-4 Turbo at 60 B,</li>
<li>same as Gemini Ultra 1.0,</li>
<li>while GPT-3.5 could by now be sub-30 B,</li>
<li>and Claude 3 Opus might be in the 200 B range.</li>
</ul>
<p>These numbers might be off by quite a bit, but speculation is free.</p>
</dokki-subtopic><dokki-subtopic title="Final words">
<p>Well, the LLMs tested here – which are among the best available – don't make for great retro DOS assembly programming assistants.</p>
<p>The tasks are seemingly quite challenging for the models, probably in part because of limited training data specific to these problems.</p>
<p>The results also appear to show the unfortunate trend of nerfings to GPT-4's capabilities, the Turbo model from early 2024 performing much worse than the mid-2023 non-Turbo (which itself was allegedly a nerf of the original Q1 2023 launch model).</p>
</dokki-subtopic></dokki-topic>
