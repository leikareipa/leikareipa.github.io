                    <dokki-topic title="My process of learning an assembly language" id="introduction">

                        <p>This post describes the steps I took to get started in assembly programming. Source code to the simple learner applets I wrote is also provided.</p>

                        <p>The post aims to give some ideas and encouragement to fellow enthusiasts who might be on the fence about getting into assembly programming.</p>

                        <dokki-subtopic title="About me" id="about-me">

                            <p>I started programming in the 1990s with BASIC, moved on to C/C++ in the early 2000s, and expanded into web development in 2018. I'm almost fully self-taught but also have some work experience as a developer.</p>
                        
                            <p>I briefly dabbled in x86 assembly in the early 2000s but didn't pursue it further until 2017, when I decided to learn it proper and began the process described in this post.</p>
                        
                        </dokki-subtopic>

                        <dokki-subtopic title="Motivation" id="motivation">

                            <p>Assembly programming is an effort in creating software out of very simple building blocks; the language tends to offer commands that don't do much more than move a few bits of data in one direction or another. By moving enough bits in correct-enough directions, you'll have created an application in assembly.</p>
                    
                            <p>
                                To the extent that a basic tenet of assembly is <i>complex from simple</i>, learning the
                                language itself isn't necessarily hard; the difficulty is determined more by what kinds
                                of software you want to create with it. By sticking &ndash; at least initially &ndash; to
                                making simple things, learning the language can be reasonably simple as well.
                            </p>

                        </dokki-subtopic>

                        <dokki-subtopic title="Choosing an assembly language" id="choosing-an-assembly-language">

                            <p>
                                There are various flavors of assembly for various systems, some more complex than others.
                            </p>

                            <p>
                                When choosing which flavor to start with, it's a good idea to consider the size of its
                                instruction set (e.g. for x86 assembly, you may not need SSE and could do better with
                                the simpler 386 or 286), the ease of use of its toolset, and how much interest you have
                                in the associated hardware or history (e.g. 6502 assembly might be a good choice if you're
                                interested in the NES console).
                            </p>

                            <p>
                                I chose 386 assembly together with 16-bit DOS because I like DOS, it's a combination can
                                be run easily in DOSBox, it allows for interesting things like direct access to video
                                memory, and it can be assembled with the handy cross-platform
                                <a href="https://flatassembler.net/">fasm</a> assembler.
                            </p>
                        
                        </dokki-subtopic>

                        <dokki-subtopic title="Building a theoretical understanding" id="building-a-theoretical-understanding">

                            <p>
                                You do need some sense of your surroundings before diving into coding, so it may be a good idea
                                to pick up a book on your chosen assembly variant and leaf through it a bit.
                            </p>

                            <p>
                                I picked up Kip Irvine's <a href="https://www.amazon.com/dp/0133769402">Assembly Language for
                                x86 Processors</a> and found it quite useful in getting an overview of x86 assembly.
                                I spent a few days reading through whatever chapters seemed interesting or relevant to me
                                and then decided to start coding.
                            </p>
                        
                        </dokki-subtopic>

                        <dokki-subtopic title="Getting into practice" id="getting-into-practice">

                            <p>
                                By this point I'd only read the book and had no practical idea of how to program in assembly.
                                But that was fine, it's a good time to start doing it.</p>

                            <p>
                                I set off to create a bunch of micro-projects: applets with a very limited scope and a simple
                                goal, like reading a string from a file. They were intended to force me to write something,
                                anything, to start forming an intuition for how 386 assembly works. These applets didn't
                                need to be complex or flashy &ndash; the simpler and plainer, the easier
                                the learning would be.
                            </p>

                            <p>
                                Since I knew I eventually wanted to do something with graphics, I ended up jumping into
                                the VGA stuff pretty early. VGA mode 13h is quite simple to deal with, even in assembly:
                                you get direct access to video memory as a flat array and just write pixels straight into it.
                            </p>

                        <dokki-subtopic title="Making software" id="making-software">

                            <p>
                                I spent about a week building the micro-projects and reading more of Irvine's book, by
                                which point I felt I was ready to start creating actual software in assembly &ndash;
                                with frequent reference to Intel's 386 programmer's manual and Google, of course.
                            </p>

                            <p>
                                You usually don't need to know the entirety of a programming language to be productive with it.
                                Software-creating endeavors tend to follow the path of (1) break the software into discrete steps
                                of implementation, and (2) figure out each step in turn. So as long as you have some feel for the
                                language, you can start tackling a step of the application and learn more as needed.
                            </p>

                            <p>
                                Below is the first actual project I did: a DOS-based texture editor for an old Finnish
                                game. It combines what I learned from doing the micro-projects (file IO, mouse and keyboard
                                input, drawing into VGA, etc.) &ndash; as well as some new things like graphics-mode
                                text rendering &ndash; into a useful application.
                            </p>

                        <dokki-subtopic title="Parting tips" id="parting-tips">
                            
                            <p>Here are a few final tips for your trip into assembly.</p>

                            <ul>
                                <li>Build some familiarity with hexadecimal and binary representations, and have a converter on hand. Assembly loves to deal with bits, and quite often numbers are represented in hex form as well (but depending on your assembler, you may be able to use decimal forms, too).</li>
                                <li>Try not to have preconceptions about something being difficult. Although I'd used C++ for a long time, I always thought bit manipulation was black magic and stayed away from it. But with assembly, I learned to do it without even noticing, because it was so ingrained in the language. The skill then carried over to C++.</li>
                                <li>For DOS-based assembly, try the DOSBox debugger. It can be very useful in tracking down bugs.</li>
                            </ul>

                        </dokki-subtopic>
