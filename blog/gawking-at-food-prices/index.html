<post-date date="14 September 2022"></post-date>
<dokki-topic title="Gawking at food prices">
<p>It's well known that consumer prices are going up in Europe. Not much you can do about it but watch on.</p>
<p>Earlier this year, I wrote <a href="https://github.com/leikareipa/hs">a handy app for keeping track of prices at Finnish K-Market stores</a>. Here's a sample screenshot:</p>
<dokki-image src="./img/hs-alpha.png" width="960" height="446"     headerless   thumbnail-src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAKCAYAAAC0VX7mAAAACXBIWXMAAAsTAAALEwEAmpwYAAABmElEQVQokW1S7U7CQBDkhXkDfvAchF+8BJGQmJgQoxLUBBWJQKIE7If0aOm199Ebs4tXIXrJ9pq92bmZ3WsAQCISlGXJkZcFpNHIpYS1lo5RVRXvWmv+L4oCh8MBxhjOO+fgV2OxWKDb7WIymUBkGYK7R2wuriA+Nn8I+/0+CL/f75Gm6R9C5xwaq9UKw+EQYRhCaY0y/EK+fEdVqjOwEIIJ1+s1jLWwxkArBVf9krFC+ih1LD5aLiGtYXJXVQwkhae2CCe1gqwMCqXqc1Y4GAzQarUwnU4Rf8XYC4FDlnGRB/lLx+Mx9y6MY0QPT9heXiMNIr64tkyE7XYbs9kMUkoYrWGUPlPkLfd6PWy3W+RFgfxjg3Q6h81lTcaEp0U0BAMHarU2hlXRZH3z/8VZW0+fCYMgQKfTwWq5xE4IhE+v+Ly5h4hinuZut2P7WZZhNBqx0iiKkCQJ0p9pU9RDIQvNZhMvz8+QqkT68obk9hFGFmeqqGg+n/NOpKSK4vTJsEL6kCWfoPYShINyJ+/QL8qTbQpf5xV+Ax5c/I3Brlf/AAAAAElFTkSuQmCC"><template #caption>A sample screenshot of the price app's web view displaying trends in logged mock data. The data shown here are simply for demonstrational purposes and are not related to the dataset discussed in this blog post.</template>
                        </dokki-image>
<p>I've had the app logging data for the past six months, tracking prices at a particular K-Market. Let's see what those data look like.</p>
<dokki-subtopic title="The overall picture">
<p>Out of the 26 products tracked, which primarily include various food items, <span style="color: crimson;">80%</span> are now more expensive than they were six months ago, while <span style="color: forestgreen;">10%</span> are cheaper.</p>
<p>On average, across all of the products tracked, from mid-March to mid-September, prices have increased by roughly <span style="color: crimson;">15%</span>.</p>
</dokki-subtopic><dokki-subtopic title="Change by category">
<p>The table below shows a breakdown of the data by select product categories:</p>
<dokki-table headerless>
    <table>
        <tr>
            <th>Category</th>
            <th>Average price change, mid-March to mid-September 2022</th>
        </tr>
        <tr>

        </tr>
        <tr>

        <tr>

</dokki-table>
<p>Meat and cheese look to be the biggest risers in this dataset. I think vegan cheese-like products, which used to be notably more expensive than the real stuff, aren't tangibly more expensive now. The vegan meat substitutes are getting pretty close as well to their counterparts – though I'm not tracking any vegan products, so this is just my gut feeling.</p>
<p>Bread doesn't seem to have gone up too much, relatively speaking. If like me you don't mind eating plain crispbread with butter then you get off the cheapest I guess.</p>
</dokki-subtopic><dokki-subtopic title="Change by month">
<p>The table below shows a breakdown of the data by month (only full months have been included):</p>
<dokki-table headerless>

<p><i>*<strong>Update:</strong> Added data for September through December.</i></p>
<p>I haven't been following industry trends long enough to know whether prices tend to fall during the summer months, but in any case we're seeing inflation slowing down toward July, and even a transient decrease in July.</p>
<p>Still, the trend in these data appears to be that prices are hiked every month. It'll be interesting to see whether this continues for the rest of the year or whether we'll see a stabilization and maybe even a slight downward trend.</p>
</dokki-subtopic><dokki-subtopic title="Conclusion">
<p>Well, prices are going up, no surprise there. On average, you might expect your bill to have increased by <span style="color: crimson;">10–20%</span> since March 2022, depending on what and where you're buying.</p>
<p>The particular K-Market I'm tracking was fairly expensive to begin with, and now it's rather expensive. Given that their main competitor chain appears to be offering staggeringly lower prices on many of these (or similar) products, I wonder how many customers this particular store is losing and what their longer-term strategy is.</p>
</dokki-subtopic></dokki-topic>
