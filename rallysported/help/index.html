<dokki-topic title="Introduction">
<p><a href="https://www.tarpeeksihyvaesoft.com/rallysported">RallySportED</a> is a contemporary modding tool for the MS-DOS racing game <a href="https://web.archive.org/web/19970805142345/http://www.cs.tut.fi/~k140734/Rally-Sport/index.html">Rally-Sport</a>.</p>
<p>RallySportED is © 2016–2023 <a href="https://www.tarpeeksihyvaesoft.com">Tarpeeksi Hyvae Soft</a>. No affiliation with Rally-Sport creator Jukka Jäkälä.</p>
<dokki-subtopic title="System requirements">
<dokki-table headerless>
    <template #table>
        <tr>
            <th>Platform</th>
            <td>Modern browser with JavaScript enabled<sup>1</sup></td>
        </tr>
        <tr>
            <th>CPU</th>
            <td>Intel Haswell or equivalent<sup>2</sup></td>
        </tr>
        <tr>
            <th>Input</th>
            <td>Mouse and keyboard</td>
        </tr>
        <tr>
            <th>Other</th>
            <td>
                Saving requires the ability to download files.
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <sup>1</sup>See <a href="#introduction-browser-compatibility">Browser compatibility</a> for details.<br>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <sup>2</sup>RallySportED uses software 3D rendering and so requires a fast CPU. The faster the better.<br>
            </td>
        </tr>
    </template>
</dokki-table>
</dokki-subtopic><dokki-subtopic title="Browser compatibility">
<dokki-table headerless>
    <template #table>
        <tr>
            <th>
                Google Chrome
            </th>
            <td>
                Best compatibility and performance.<br><br>For Chrome on iOS, see <strong>Apple Safari</strong>.
            </td>
        </tr>
        <tr>
            <th>
                Mozilla Firefox
            </th>
            <td>
                Reasonable compatibility but poor performance.
            </td>
        </tr>
        <tr>
            <th>
                Apple Safari
            </th>
            <td>
                Works if you're lucky.
            </td>
        </tr>
    </template>
</dokki-table>
</dokki-subtopic></dokki-topic>

<dokki-topic title="Controls">
<dokki-subtopic title="Terrain editor">
<dokki-table>
    <template #caption>
        Keyboard
    </template>
    <template #table>
        <tr>
            <th>Input</th>
            <th>Result</th>
        </tr>
        <tr>
            <td><key-input>E</key-input> <key-input>S</key-input> <key-input>D</key-input> <key-input>F</key-input></td>
            <td>Move the camera.</td>
        </tr>
        <tr>
            <td><key-input>1</key-input> <key-input>2</key-input> <key-input>3</key-input> <key-input>4</key-input></td>
            <td>Set the brush radius.</td>
        </tr>
        <tr>
            <td><key-input>L</key-input></td>
            <td>Bulldoze the ground to a given height.</td>
        </tr>
        <tr>
            <td><key-input>W</key-input></td>
            <td>Toggle wireframe rendering on/off.</td>
        </tr>
        <tr>
            <td><key-input>B</key-input></td>
            <td>Toggle prop transparency on/off.</td>
        </tr>
        <tr>
            <td><key-input>T</key-input></td>
            <td>Open in the texture editor the texture on which the mouse hovers.</td>
        </tr>
        <tr>
            <td><key-input>G</key-input></td>
            <td>Toggle mouse hover PALA preview on/off.</td>
        </tr>
        <tr>
            <td><key-input>A</key-input></td>
            <td>Toggle the PALA texture pane on/off.</td>
        </tr>
        <tr>
            <td><key-input>Q</key-input></td>
            <td>Open the tilemap editor.</td>
        </tr>
        <tr>
            <td><key-input>Space</key-input></td>
            <td>Toggle ground smoothing on/off.</td>
        </tr>
        <tr>
            <td><key-input>&uarr;</key-input></td>
            <td>Raise the ground by one unit where the mouse cursor is hovering.</td>
        </tr>
        <tr>
            <td><key-input>&darr;</key-input></td>
            <td>Lower the ground by one unit where the mouse cursor is hovering.</td>
        </tr>
        <tr>
            <td><key-input>Ctrl + S</key-input></td>
            <td>Download (save) the current track.</td>
        </tr>
        <tr>
            <td><key-input>Ctrl + Z</key-input></td>
            <td>Undo changes (across all editors).</td>
        </tr>
        <tr>
            <td><key-input>Ctrl + Shift + Z</key-input></td>
            <td>Redo changes (across all editors).</td>
        </tr>
    </template>
</dokki-table>
<dokki-table>
    <template #caption>
        Mouse
    </template>
    <template #table>
        <tr>
            <th>Input</th>
            <th>Target</th>
            <th>Result</th>
        </tr>
        <tr>
            <td><mouse-input>Left click</mouse-input></td>
            <td>Ground</td>
            <td>Move the ground up; or, if ground smoothing is enabled, apply a smoothing filter to the ground. The size of the area affected depends on the current brush radius.</td>
        </tr>
        <tr>
            <td><mouse-input>Left click and drag</mouse-input></td>
            <td>Prop</td>
            <td>Move the prop.</td>
        </tr>
        <tr>
            <td><mouse-input>Shift + Left click</mouse-input></td>
            <td>Prop</td>
            <td>Remove the prop.</td>
        </tr>
        <tr>
            <td><mouse-input>Shift + Left click</mouse-input></td>
            <td>Ground</td>
            <td>Add a prop.</td>
        </tr>
        <tr>
            <td><mouse-input>Tab + Left click</mouse-input></td>
            <td>Ground</td>
            <td>Eye dropper tool: select the PALA on which the cursor hovers.</td>
        </tr>
        <tr>
            <td><mouse-input>Right click</mouse-input></td>
            <td>Ground</td>
            <td>Move the ground down; or, if ground smoothing is enabled, apply a smoothing filter to the ground. The size of the area affected down depends on the current brush radius.</td>
        </tr>
        <tr>
            <td><mouse-input>Right click</mouse-input></td>
            <td>Prop</td>
            <td>Change the prop's type.</td>
        </tr>
        <tr>
            <td><mouse-input>Middle click</mouse-input></td>
            <td>Ground</td>

        </tr>
        <tr>
            <td><mouse-input>Shift + Mouse wheel</mouse-input></td>

        </tr>
    </template>

<dokki-topic title="Farting up a sample track">
<p>The following video shows a quick throwing together of a sample track.</p>
<dokki-video headerless src="NaSuve7f7Cc"></dokki-video>
<p>The steps in the video can be summarized like so:</p>
<ol>
<li>Start with Rally-Sport's <a href="/rallysported/?track=demoa">track #1</a> as a base (using the &quot;?track=&quot; URL parameter). Alternatively, you could drag and drop the ZIP file of a  RallySportED project you've downloaded previously.</li>
<li>In the terrain editor, level the terrain to a height of 0 by hitting <key-input>L</key-input>.</li>
<li>In the tilemap editor, paint the ground a solid grass with <mouse-input>Left click</mouse-input>.</li>
<li>Back in the terrain editor, clear away some of the track props (trees, billboards, etc.) with <mouse-input>Shift + Left click</mouse-input> over the props.</li>
<li>Use <mouse-input>Middle click</mouse-input> to paint a gravel road.</li>
<li>Add some decorative props with <mouse-input>Shift + Left click</mouse-input>, and <mouse-input>Left click</mouse-input> over a prop to change its type.</li>
<li>Record the CPU opponent's driving line.</li>
<li>Adjust the terrain height with <mouse-input>Left click</mouse-input> and <mouse-input>Right click</mouse-input>, and more precisely with <key-input>Up</key-input> and <key-input>Down</key-input>.</li>
<li>Use terrain tile #0 to add water.</li>
<li>Use terrain tiles #248 and #249 to add bridges.</li>
<li>Paint some textures in the texture editor.</li>
</ol>
</dokki-topic>
