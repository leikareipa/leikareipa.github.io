<dokki-topic title="Metarendering in a custom UI framework">
<p>Some while ago, I started a time-waster project to reproduce the salient aspects of the UI of Windows 95 inside a HTML &lt;canvas&gt;, and to derive from that a front-end framework for building Windows 95-lookalike web apps.</p>
<p>The project is gradually coming along; I recently worked on implementing support for metarendering, which I'll go over briefly in this article.</p>
<p>To draw its UI components, the framework uses a software renderer of mine, <a href="https://github.com/leikareipa/retro-ngon/">the retro n-gon renderer</a>. It's a well-featured renderer that's fairly malleable to various styles of rendering.</p>
<p>Where metarendering comes in is when applications want to render something themselves &ndash; for example, a game might render a 3D scene for the player to explore. The framework then has to integrate apps' own renderings into the UI, and maybe even to provide an API for custom rendering to begin with.</p>
<p>Here's is a sample animation of an app created using the Windows 95 framework, rendering a spinning cube inside its window:</p>

<p>The animation has been downconverted into 15 FPS for the sake of file size, but you get the idea. The cube image is rendered by the application, while the window decorations, menus, widgets, etc. are drawn by the framework's UI renderer, which also displays the image that the app has rendered.</p>
<p>Below is a simplified version of the code that defines the <em>renderTest</em> app, which uses the <em>renderSurface</em> API provided by the framework to render the spinning cube:</p>

                <dokki-code syntax="javascript"headerless="true">
                    <template #code>
                        <pre>function renderTest()
{
    const numTicks = w95.state(0);

    // Each UI tick, update the cube's rotation.
    w95.tick.listen(timeDeltaMs=&gt;{
        numTicks.set(numTicks.now + 1);
        const fps = (1000 / (timeDeltaMs || 1000));
        cubeMesh.rotation.y = ((cubeMesh.rotation.y + Rngon.trig.deg(80 / fps)) % Rngon.trig.deg(359));
    });

    return w95.widget.window({
        title: &quot;Render test&quot;,
        children: [
            w95.widget.renderSurface({
                meshes: [cubeMesh],
                options,
            }),
        ],
    });
}
</pre>
                    </template>
                </dokki-code>
            
<p>The function constructs and returns an instance of a window widget, which contains an instance of the <em>renderSurface</em> API, which in turn produces and displays a rasterized image of the input cube mesh. Every time the <em>numTicks</em> state variable is mutated, the <em>renderTest()</em> function is called again, returning updated instances of the widgets and therefore animating the cube image.</p>
<p>The function is essentially like component functions in React, taking in some props as arguments (simplified away in this example) and returning a view of the component. For maintaining state between re-renderings, <em>w95.state</em> is the equivalent of <nobr><em>React.useState</em>.</nobr></p>
<p>Here's a simplified version of the code for the <em>renderSurface</em> API widget:</p>

                <dokki-code syntax="javascript"headerless="true">
                    <template #code>
                        <pre>function renderSurface({
    width = 100,
    height = 100,
    meshes = [Rngon.mesh()],
    options = {},
    id = &quot;w95-render-surface&quot;,
} = {})
{
    // Render the input meshes into an off-screen pixel buffer,
    // which will be accessible via Rngon.state[id].pixelBuffer.
    Rngon.render(null, meshes, {
        state: id,
        width: ~~(width * (options.scale || 1)),
        height: ~~(height * (options.scale || 1)),
        ...options,
    });

    return Rngon.ngon([
        Rngon.vertex(0, 0),
        Rngon.vertex(width, 0),
        Rngon.vertex(width, height),
        Rngon.vertex(0, height)], {
            texture: Rngon.state[id].pixelBuffer,
    });
}
</pre>
                    </template>
                </dokki-code>
            
<p><em>Rngon</em> here is the global namespace of the retro n-gon renderer. The widget uses it to render the given meshes into a texture, then returns a polygon textured with that image to visually represent the widget in the UI. The widget in other words integrates custom app rendering into the UI, and from the app's viewpoint it's basically a passthrough to <nobr><em>Rngon.render()</em>.</nobr></p>
<p>The renderer used on the input meshes could be something other than the retro n-gon renderer, as long as it runs synchronously and outputs a pixel buffer.</p>
