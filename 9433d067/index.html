<dokki-topic title="My first path tracer">
<p>In 2010, on the heels of having worked on a 2.5D voxel ray caster, I set out to write my first ray-tracing renderer.</p>
<p>Though the renderer started life as a pure ray tracer, it quickly morphed into a path tracer, and served for the next several years as my testbed in offline rendering.</p>
